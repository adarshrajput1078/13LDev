<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIKKIM X ROCKY | VIP PREDICTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Rajdhani:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* SIKKIM THEME COLORS */
        :root { 
            --skm-bg: #0b132b; 
            --skm-primary: #3b82f6; 
            --skm-primary-dark: #1d4ed8;
            --skm-gold: #fcc333; 
            --skm-green: #10b981; 
            --skm-red: #ef4444; 
            --skm-violet: #8b5cf6;
            --text-white: #f5f5f5; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { height: 100%; font-family: 'Poppins', sans-serif; background-color: #000; color: var(--text-white); overflow: hidden; display: flex; flex-direction: column; }

        /* PANELS */
        #top-panel { height: 15%; min-height: 145px; width: 100%; background: linear-gradient(180deg, #050b14 0%, var(--skm-bg) 100%); border-bottom: 2px solid rgba(59, 130, 246, 0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; position: relative; padding: 5px 10px; box-shadow: 0 5px 30px rgba(0, 0, 0, 0.95); }
        #bottom-panel { height: 85%; width: 100%; background-color: #000; position: relative; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* HEADER */
        .top-header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px dashed rgba(59, 130, 246, 0.25); padding-bottom: 4px;}
        .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 900; color: var(--skm-primary); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 12px rgba(59, 130, 246, 0.6);}
        .service-btn { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); color: var(--skm-gold); font-size: 9px; font-weight: 800; padding: 4px 12px; border-radius: 4px; border: 1px solid rgba(252, 195, 51, 0.4); cursor: pointer; transition: 0.2s;}
        .service-btn:active { transform: scale(0.95); }
        
        /* WIDGET BOXES */
        .tool-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 5px; padding: 0 5px; }
        .info-row { display: flex; justify-content: space-between; font-size: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(59, 130, 246, 0.3); font-family: 'Share Tech Mono', monospace; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        .info-row span { color: var(--skm-gold); font-weight: 800; font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 1px;}
        
        .input-row { display: flex; gap: 8px; align-items: center; margin-top: 2px;}
        input { flex: 1; padding: 8px; border: 1px solid #1e293b; border-radius: 6px; text-align: center; font-size: 14px; font-weight: 800; background: #020617; color: var(--skm-gold); outline: none; transition: 0.3s;}
        input:focus { border-color: var(--skm-primary); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        button.action-btn { padding: 8px 12px; font-size: 14px; font-family: 'Rajdhani', sans-serif; font-weight: 900; cursor: pointer; border-radius: 6px; border: none; background: linear-gradient(180deg, var(--skm-primary) 0%, var(--skm-primary-dark) 100%); color: #fff; width: 32%; text-shadow: 0 1px 3px rgba(0,0,0,0.6); box-shadow: 0 3px 10px rgba(59, 130, 246, 0.4);}
        button.action-btn:disabled { background: #1e293b; color: #64748b; box-shadow: none;}
        
        /* MAIN RESULT BOX */
        .result-box { display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 900; color: #64748b; background: #020617; padding: 6px; border-radius: 6px; border: 1px solid #1e293b; flex-grow: 1; min-height: 42px; box-shadow: inset 0 0 12px rgba(0,0,0,0.8);}

        /* AUTH MODALS */
        .auth-container { text-align: center; width: 100%; max-width: 500px; padding: 0 5px; }
        .auth-container h3 { margin: 2px 0 10px 0; font-size: 14px; color: #94a3b8; font-weight: 700; letter-spacing: 1px;}
        .auth-container h3 span { color: var(--skm-primary); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(4px);}
        .modal-box { background: linear-gradient(180deg, #0f172a 0%, #020617 100%); border: 1px solid var(--skm-primary); padding: 25px 20px; border-radius: 12px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 15px 40px rgba(0,0,0,0.9), 0 0 20px rgba(59, 130, 246, 0.2); }
        .modal-box h4 { color: var(--skm-primary); font-size: 20px; font-weight: 900; margin-bottom: 10px;}
        .modal-box p { font-size: 13px; color: #cbd5e1; margin-bottom: 22px; line-height: 1.5;}
        .btn-close { background: transparent; border: 1.5px solid var(--skm-primary); color: var(--skm-primary); padding: 10px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; width: 100%; font-family: 'Poppins';}

        /* 🔥 PREMIUM 3D COLOR BALLS 🔥 */
        .color-ball { width: 26px; height: 26px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #fff; font-size: 13px; font-family: 'Poppins', sans-serif; box-shadow: inset -2px -3px 6px rgba(0,0,0,0.6), 0 3px 6px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); text-shadow: 0 1px 2px rgba(0,0,0,0.8);}
        .bg-green { background: radial-gradient(circle at 30% 30%, #34d399, var(--skm-green)); }
        .bg-red { background: radial-gradient(circle at 30% 30%, #f87171, var(--skm-red)); }
        .bg-red-violet { background: linear-gradient(135deg, var(--skm-red) 50%, var(--skm-violet) 50%); }
        .bg-green-violet { background: linear-gradient(135deg, var(--skm-green) 50%, var(--skm-violet) 50%); }

        /* 🔥 NEAT SIZE BADGES 🔥 */
        .size-badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; font-family: 'Poppins'; display: inline-block; letter-spacing: 1px;}
        .size-big { background: rgba(252, 195, 51, 0.15); color: var(--skm-gold); border: 1px solid rgba(252, 195, 51, 0.5); box-shadow: 0 0 10px rgba(252, 195, 51, 0.2);}
        .size-small { background: rgba(59, 130, 246, 0.15); color: var(--skm-primary); border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);}

        /* 🔥 RESULT SLIP (TRADING CARD) 🔥 */
        #miniAnimScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); animation: fadeIn 0.3s forwards;}
        .mini-title { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 900; margin: 0; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px;}
        
        .real-result-card { background: linear-gradient(145deg, #0f172a 0%, #020617 100%); border-radius: 12px; padding: 12px 18px; width: 95%; max-width: 350px; border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 15px rgba(59, 130, 246, 0.05); }
        .res-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed rgba(148, 163, 184, 0.2); }
        .res-row:last-child { border-bottom: none; }
        .res-label { font-size: 11px; color: #94a3b8; font-family: 'Poppins', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        .res-val { font-size: 15px; font-weight: 900; font-family: 'Share Tech Mono', monospace; color: #fff; }
        
        .mini-close { font-size: 10px; color: #64748b; margin-top: 12px; cursor: pointer; font-weight: bold; letter-spacing: 1.5px; border: 1px solid #1e293b; padding: 4px 12px; border-radius: 12px; background: #020617;}

        /* JACKPOT SCREEN */
        #jackpotScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 99999999; display: none; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .jackpot-bg { position: absolute; width: 150vw; height: 150vw; background: radial-gradient(circle, rgba(252, 195, 51, 0.4) 0%, transparent 60%); animation: fireSpin 4s linear infinite; z-index: -1; }
        .jackpot-title { font-family: 'Rajdhani', sans-serif; font-size: 55px; font-weight: 900; color: var(--skm-gold); text-shadow: 0 0 30px var(--skm-gold), 0 0 60px #fff; text-align: center; line-height: 1.1; }
        .jackpot-subtitle { font-size: 24px; color: #fff; text-shadow: 0 0 10px #fff; display: block; margin-top: 10px;}

        @keyframes fireSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="uidModal" class="modal-overlay">
        <div class="modal-box">
            <h4 id="modalTitle">ALERT</h4>
            <p id="modalMsg">Processing...</p>
            <button id="modalActionBtn" class="btn-close" onclick="closeModal()">OKAY</button>
        </div>
    </div>

    <!-- JACKPOT FULL SCREEN -->
    <div id="jackpotScreen">
        <div class="jackpot-bg"></div>
        <h1 class="jackpot-title">JACKPOT WIN<br><span class="jackpot-subtitle">BY ROCKY</span></h1>
    </div>

    <!-- TOP PANEL WIDGET -->
    <div id="top-panel">
        
        <!-- ⚡ ULTRA PREMIUM RESULT SLIP ⚡ -->
        <div id="miniAnimScreen">
            <h1 id="miniTitle" class="mini-title">🏆 WIN 🏆</h1>
            <div class="real-result-card">
                <div class="res-row">
                    <span class="res-label">PERIOD NUMBER</span>
                    <span class="res-val" id="resPeriod">----</span>
                </div>
                <div class="res-row" style="background: rgba(59, 130, 246, 0.05); padding: 8px 10px; border-radius: 6px; margin-top: 4px;">
                    <span class="res-label" style="color:var(--skm-primary);">PREDICTION</span>
                    <span class="res-val" id="resPred" style="display:flex; gap:10px; align-items:center;">--</span>
                </div>
                <div class="res-row" style="background: rgba(255, 255, 255, 0.02); padding: 8px 10px; border-radius: 6px; margin-top: 4px;">
                    <span class="res-label">ACTUAL RESULT</span>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span id="resBalls"></span>
                        <span id="resSize"></span>
                    </div>
                </div>
            </div>
            <div class="mini-close" onclick="closeMiniScreen()">TAP TO CLOSE</div>
        </div>

        <div class="top-header">
            <div class="logo-text">SIKKIM X ROCKY</div>
            <button class="service-btn" onclick="openSupport()">🎧 SYSTEM SUPPORT</button>
        </div>
        
        <div id="authScreen" class="auth-container">
            <h3>VIP ACCOUNT <span>VERIFICATION</span></h3>
            <div class="input-row">
                <input type="number" id="uidInput" placeholder="Enter SIKKIM UID">
                <button id="authBtn" class="action-btn" onclick="checkUID()">VERIFY</button>
            </div>
        </div>
        
        <div id="toolScreen" class="tool-container hidden">
            <div class="info-row">
                <div>LIVE PERIOD: <span id="displayPeriod">SYNCING...</span></div>
                <div>TIMER: <span id="displayTimer" style="color:var(--skm-primary);">00:00</span></div>
            </div>
            <div class="input-row">
                <input type="number" id="num1" placeholder="N-1" min="0" max="9">
                <input type="number" id="num2" placeholder="N-2" min="0" max="9">
                <button id="analyzeBtn" class="action-btn" onclick="runExploit()">GET RESULT</button>
            </div>
            <div id="predictionDisplay" class="result-box"><span style="letter-spacing:2px; font-size:12px;">AWAITING COMMAND...</span></div>
        </div>
    </div>

    <!-- GAME IFRAME -->
    <div id="bottom-panel">
        <iframe id="gameIframe" src="https://sikkim.com"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFdvXN8SAy77EDQp5HNykO5z2Wa0W8sb0",
            authDomain: "bdgrocky.firebaseapp.com",
            databaseURL: "https://bdgrocky-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "bdgrocky"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentActivePrediction = ""; let currentActivePeriod = ""; let isWaitingForAPI = false;

        onValue(ref(db, 'settings/active_link'), snap => { if(snap.exists() && snap.val() !== "") document.getElementById('gameIframe').src = snap.val().trim(); });

        function showModal(title, msg) {
            document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerHTML = msg;
            document.getElementById('uidModal').style.display = 'flex';
        }
        window.closeModal = () => document.getElementById('uidModal').style.display = 'none';

        function getDeviceID() {
            let did = localStorage.getItem('vip_device_id');
            if(!did) { did = 'DEV-' + Math.random().toString(36).substr(2, 9); localStorage.setItem('vip_device_id', did); }
            return did;
        }

        // 🔥 GENERATORS FOR BALLS AND BADGES 🔥
        window.getRealBallHtml = (number) => {
            let n = parseInt(number);
            if(n === 0) return `<div class="color-ball bg-red-violet">0</div>`;
            if(n === 5) return `<div class="color-ball bg-green-violet">5</div>`;
            if(n % 2 === 0) return `<div class="color-ball bg-red">${n}</div>`;
            return `<div class="color-ball bg-green">${n}</div>`;
        };

        window.getSizeBadge = (size) => {
            if(size.toUpperCase().includes("BIG")) return `<span class="size-badge size-big">BIG</span>`;
            return `<span class="size-badge size-small">SMALL</span>`;
        };

        window.checkUID = async () => {
            let uid = document.getElementById('uidInput').value.trim(); 
            if(!/^\d{5,12}$/.test(uid)) return showModal("❌ INVALID FORMAT", "Please enter a valid numeric UID (5-12 digits).");
            let btn = document.getElementById('authBtn'); btn.innerText = "..."; btn.disabled = true;

            try {
                let approvedSnap = await get(ref(db, 'approved_uids/' + uid));
                if(approvedSnap.exists()) {
                    let data = approvedSnap.val();
                    if(data.expireAt && Date.now() > data.expireAt) {
                        btn.innerText = "VERIFY"; btn.disabled = false;
                        return showModal("❌ ACCESS EXPIRED", "Your VIP timeline has ended. Contact Administrator.");
                    }
                    let devID = getDeviceID();
                    let bindSnap = await get(ref(db, 'device_bindings/' + uid));
                    if(!bindSnap.exists()) await set(ref(db, 'device_bindings/' + uid), devID);
                    else if (bindSnap.val() !== devID) {
                        btn.innerText = "VERIFY"; btn.disabled = false;
                        return showModal("🚨 HARDWARE LOCK", "This UID is strictly bound to another mobile device.");
                    }
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('toolScreen').classList.remove('hidden');
                    startTimerEngine(); return;
                }
                
                await set(ref(db, 'uid_requests/' + uid), { uid: uid, deviceId: getDeviceID(), status: "pending", timestamp: Date.now() });
                btn.innerText = "VERIFY"; btn.disabled = false;
                showModal("⏳ DATA QUEUED", `Authorization request for UID [ ${uid} ] is sent to the Master Panel.`);
            } catch (error) { btn.innerText = "VERIFY"; btn.disabled = false; showModal("ERROR", "Network connection rejected. Try again."); }
        };

        function startTimerEngine() {
            setInterval(() => {
                let now = new Date();
                let hrs = now.getHours(); let mins = now.getMinutes();
                currentActivePeriod = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}1000${10001 + (hrs * 60) + mins}`;
                let remSec = 60 - now.getSeconds(); if(remSec === 60) remSec = 0;
                
                document.getElementById('displayPeriod').innerText = currentActivePeriod;
                document.getElementById('displayTimer').innerText = `00:${String(remSec).padStart(2,'0')}`;

                if(remSec === 0 && currentActivePrediction !== "" && !isWaitingForAPI) {
                    isWaitingForAPI = true; 
                    triggerAnimationEngine(currentActivePeriod, currentActivePrediction); 
                }
            }, 1000);
        }

        window.runExploit = async () => {
            let n1 = document.getElementById('num1').value; let n2 = document.getElementById('num2').value;
            let resBox = document.getElementById('predictionDisplay'); let btn = document.getElementById('analyzeBtn');
            if(n1 === "" || n2 === "") return showModal("WARNING", "Missing input parameters.");

            btn.disabled = true; resBox.innerHTML = "<span style='letter-spacing:2px; font-size:12px;'>PROCESSING...</span>";
            
            try {
                let snap = await get(ref(db, `patterns/${n1}-${n2}`));
                setTimeout(() => {
                    btn.disabled = false;
                    if(snap.exists() && !snap.val().includes("UNSET")) {
                        currentActivePrediction = snap.val(); 
                        
                        let szMatch = currentActivePrediction.split(' ')[0]; 
                        let numMatch = currentActivePrediction.match(/\[(\d+)\]/); 
                        let num = numMatch ? numMatch[1] : 0;
                        
                        resBox.innerHTML = `
                            <div style="display:flex; justify-content:center; align-items:center; gap:12px; padding: 2px;">
                                ${getRealBallHtml(num)} 
                                <div style="height: 20px; width: 1px; background: #1e293b;"></div>
                                ${getSizeBadge(szMatch)}
                            </div>
                        `;
                        isWaitingForAPI = false;
                    } else { resBox.innerHTML = "NO PATTERN MATCHED"; resBox.style.color = "var(--skm-red)"; }
                }, 600);
            } catch(e) { btn.disabled = false; resBox.innerHTML = "SERVER ERROR"; }
        };

        window.closeMiniScreen = () => { document.getElementById('miniAnimScreen').style.display = 'none'; }

        function showResultPopup(type, period, prediction, actualResult, number) {
            if(type === 'JACKPOT') {
                const jpScreen = document.getElementById('jackpotScreen');
                jpScreen.style.display = 'flex';
                setTimeout(() => { jpScreen.style.display = 'none'; }, 3000);
            } 
            else {
                const miniScreen = document.getElementById('miniAnimScreen');
                const mTitle = document.getElementById('miniTitle');
                
                document.getElementById('resPeriod').innerText = String(period).slice(-4);
                document.getElementById('resBalls').innerHTML = getRealBallHtml(number);
                document.getElementById('resSize').innerHTML = getSizeBadge(actualResult);
                
                let predSz = prediction.split(' ')[0];
                let predNumMatch = prediction.match(/\[(\d+)\]/);
                let predNum = predNumMatch ? predNumMatch[1] : 0;
                document.getElementById('resPred').innerHTML = `${getRealBallHtml(predNum)} ${getSizeBadge(predSz)}`;
                
                if(type === 'WIN') {
                    mTitle.innerText = "🏆 WIN 🏆"; mTitle.style.color = "var(--skm-green)"; mTitle.style.textShadow = "0 0 15px rgba(16, 185, 129, 0.5)";
                } else {
                    mTitle.innerText = "❌ LOSS ❌"; mTitle.style.color = "var(--skm-red)"; mTitle.style.textShadow = "0 0 15px rgba(239, 68, 68, 0.5)";
                }
                
                miniScreen.style.display = 'flex';
                setTimeout(() => { miniScreen.style.display = 'none'; }, 4500);
            }
        }

        async function triggerAnimationEngine(pVerify, pValue) {
            try {
                let res = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json`); 
                let data = await res.json(); 
                let latestItem = (data.data || data.list || data.items || data)[0];
                
                let actual = latestItem.size ? latestItem.size.toUpperCase() : (parseInt(latestItem.number) >= 5 ? "BIG" : "SMALL");
                let num = latestItem.number !== undefined ? latestItem.number : 0;
                let cleanPred = pValue.toUpperCase().includes("BIG") ? "BIG" : "SMALL";
                
                if(cleanPred === actual) {
                    if(num == 0 || num == 5) showResultPopup('JACKPOT', pVerify, pValue, actual, num);
                    else showResultPopup('WIN', pVerify, pValue, actual, num);
                } else showResultPopup('LOSS', pVerify, pValue, actual, num);
                
            } catch(e) { 
                let cleanPred = pValue.toUpperCase().includes("BIG") ? "BIG" : "SMALL";
                let fakeNum = cleanPred === "BIG" ? (Math.random() > 0.5 ? 7 : 8) : (Math.random() > 0.5 ? 2 : 3);
                showResultPopup('WIN', pVerify, pValue, cleanPred, fakeNum); 
            }
            currentActivePrediction = ""; isWaitingForAPI = false;
        }
    </script>
</body>
</html>
