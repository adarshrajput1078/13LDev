<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEV AMRY - PRO COMMAND CENTER</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-main: #07070a; --bg-panel: #111118; --border-color: rgba(0, 255, 255, 0.15);
      --cyan: #00ffff; --magenta: #ff00ff; --lime: #39ff14; --red: #ff003c; --gold: #ffd700;
      --text-main: #ffffff; --text-muted: #8b8b9e;
      --sidebar-width: 280px; --base-padding: 30px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 16px; }

    /* --- SIDEBAR --- */
    .sidebar { width: var(--sidebar-width); background: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 30px 20px; box-shadow: 5px 0 30px rgba(0,0,0,0.5); z-index: 100;}
    .brand { font-family: 'Share Tech Mono'; font-size: 32px; color: var(--cyan); text-align: center; margin-bottom: 40px; text-shadow: 0 0 15px rgba(0,255,255,0.5); font-weight: bold; }
    .brand span { color: var(--magenta); text-shadow: 0 0 15px rgba(255,0,255,0.5); }
    .nav-menu { display: flex; flex-direction: column; gap: 15px; flex: 1; }
    .nav-item { padding: 15px 20px; border-radius: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 15px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
    .nav-item:hover, .nav-item.active { background: rgba(0, 255, 255, 0.1); color: var(--cyan); border-left: 6px solid var(--cyan); }
    .kill-switch { margin-top: auto; background: rgba(255, 0, 60, 0.1); border: 1px solid var(--red); color: var(--red); padding: 15px; border-radius: 10px; font-size: 16px; text-align: center; cursor: pointer; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
    .kill-switch:hover { background: var(--red); color: #fff; box-shadow: 0 0 30px rgba(255, 0, 60, 0.6); }

    /* --- MAIN CONTENT --- */
    .main-content { flex: 1; display: flex; flex-direction: column; padding: var(--base-padding); overflow-y: auto; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header-bar h2 { font-weight: 900; font-size: 28px; }
    .search-box { display: flex; align-items: center; background: var(--bg-panel); border: 2px solid var(--border-color); border-radius: 10px; padding: 12px 20px; width: 350px; }
    .search-box input { background: transparent; border: none; color: #fff; outline: none; width: 100%; font-family: 'Share Tech Mono'; font-size: 16px; margin-left: 10px; }

    /* --- STATS & SESSION --- */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr) 1.5fr; gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--bg-panel); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); border-left: 6px solid var(--cyan); }
    .stat-card.lime { border-left-color: var(--lime); } .stat-card.gold { border-left-color: var(--gold); } .stat-card.red { border-left-color: var(--red); }
    .stat-title { font-size: 13px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
    .stat-value { font-family: 'Share Tech Mono'; font-size: 32px; font-weight: bold; }
    
    .session-card { background: rgba(0,255,255,0.05); border: 1px solid var(--cyan); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
    .session-card h3 { font-size: 14px; color: var(--cyan); margin-bottom: 10px; text-transform: uppercase; }
    .session-inputs { display: flex; gap: 10px; align-items: center; }
    .session-inputs input { background: #000; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 4px; font-family: 'Share Tech Mono'; }
    .session-res { margin-top: 10px; font-size: 14px; font-weight: bold; color: var(--lime); }

    /* --- CONTROLS --- */
    .control-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .control-box { background: var(--bg-panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); }
    .control-box h3 { font-size: 16px; margin-bottom: 15px; color: var(--cyan); display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
    .input-group { display: flex; gap: 10px; flex-direction: column; }
    .input-group input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 2px solid #333; color: #fff; border-radius: 8px; font-family: 'Share Tech Mono'; font-size: 16px; outline: none; }
    .btn-primary { padding: 14px 20px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
    .btn-toggle { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); color: #fff; border: 2px solid #444; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: auto;}
    .btn-toggle.active { background: rgba(255, 0, 60, 0.1); border-color: var(--red); color: var(--red); }

    /* --- TABLE WITH BULK ACTION --- */
    .table-container { background: var(--bg-panel); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .table-header { padding: 20px 25px; border-bottom: 2px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .table-header h3 { font-weight: 900; font-size: 20px; color: #fff; }
    .btn-bulk { background: var(--lime); color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 14px; }
    
    .table-wrapper { overflow: auto; flex: 1; }
    table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1100px; }
    th { background: rgba(0,0,0,0.8); color: var(--text-muted); font-size: 13px; text-transform: uppercase; padding: 15px 20px; position: sticky; top: 0; z-index: 10; font-weight: 800; }
    td { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 15px; vertical-align: middle; transition: 0.3s; }
    
    /* Copy Feature & Badges */
    .uid-text { cursor: pointer; color: var(--cyan); position: relative; }
    .uid-text:hover { text-decoration: underline; }
    .multi-acc-warning { color: var(--red); font-size: 10px; font-weight: 900; border: 1px solid var(--red); padding: 2px 5px; border-radius: 4px; margin-top: 5px; display: inline-block; animation: blink 1s infinite; }
    
    .badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 900; text-transform: uppercase; font-family: 'Share Tech Mono'; display: inline-flex; align-items: center; gap: 6px; }
    .badge.pending { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid rgba(255, 215, 0, 0.3); }
    .badge.active { background: rgba(57, 255, 20, 0.1); color: var(--lime); border: 1px solid rgba(57, 255, 20, 0.3); }
    .badge.blocked { background: rgba(255, 0, 60, 0.1); color: var(--red); border: 1px solid rgba(255, 0, 60, 0.3); }
    
    .urgent-pulse { background: var(--red); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; margin-left: 10px; animation: blink 1s infinite; display: inline-block; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .action-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm { padding: 8px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 900; cursor: pointer; font-family: 'Share Tech Mono'; }
    .btn-approve { background: rgba(57, 255, 20, 0.15); color: var(--lime); border: 1px solid var(--lime); }
    .btn-danger { background: rgba(255, 0, 60, 0.15); color: var(--red); border: 1px solid var(--red); }
    .btn-warning { background: rgba(255, 215, 0, 0.15); color: var(--gold); border: 1px solid var(--gold); }
    .btn-del { background: transparent; color: var(--text-muted); border: 1px solid #555; }
    
    /* Heatmap classes */
    .row-heat-yellow { background: rgba(255, 215, 0, 0.08); }
    .row-heat-orange { background: rgba(255, 69, 0, 0.15); }
    .row-heat-red { background: rgba(255, 0, 0, 0.25); }

    /* Custom Checkbox */
    input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--cyan); cursor: pointer; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    @media (max-width: 1024px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
        .control-panel { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
        body { flex-direction: column; overflow-y: auto; }
        .sidebar { width: 100%; border-bottom: 2px solid var(--border-color); padding: 15px; flex-direction: row; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .nav-menu { display: none; }
        .main-content { overflow-y: visible; }
        .stats-grid, .control-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">DEV <span>AMRY</span></div>
    <div class="nav-menu">
      <div class="nav-item active"><i class="fa-solid fa-server"></i> Dashboard</div>
    </div>
    <button class="kill-switch" id="globalKillBtn"><i class="fa-solid fa-skull"></i> KILL SWITCH</button>
  </aside>

  <main class="main-content">
    <header class="header-bar">
      <h2>Control Center</h2>
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search UID or Status...">
      </div>
    </header>

    <section class="stats-grid">
      <div class="stat-card"><div class="stat-title">Total Users</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="stat-card lime"><div class="stat-title">Active</div><div class="stat-value" style="color: var(--lime);" id="statActive">0</div></div>
      <div class="stat-card gold"><div class="stat-title">Pending</div><div class="stat-value" style="color: var(--gold);" id="statPending">0</div></div>
      <div class="stat-card red"><div class="stat-title">Urgent</div><div class="stat-value" style="color: var(--red);" id="statUrgent">0</div></div>
      
      <!-- SESSION ANALYTICS -->
      <div class="session-card">
        <h3><i class="fa-solid fa-stopwatch"></i> Session Analytics</h3>
        <div class="session-inputs">
            <input type="time" id="sessStart" value="10:00"> TO 
            <input type="time" id="sessEnd" value="12:00">
            <button onclick="calculateSession()" style="padding:5px 10px; background:var(--cyan); border:none; border-radius:4px; font-weight:bold; cursor:pointer;">CHECK</button>
        </div>
        <div class="session-res" id="sessResult">Select time to check requests.</div>
      </div>
    </section>

    <section class="control-panel">
      <div class="control-box">
        <h3 style="color:var(--lime);"><i class="fa-solid fa-user-plus"></i> Manual UID Add</h3>
        <div class="input-group">
          <input type="number" id="manualUidInput" placeholder="Enter UID (Starts with 6)...">
          <button class="btn-primary" style="background:var(--lime);" id="manualAddBtn">ADD USER</button>
        </div>
      </div>
      <div class="control-box">
        <h3 style="color:var(--cyan);"><i class="fa-solid fa-link"></i> Live URL Injection</h3>
        <div class="input-group">
          <input type="text" id="gameUrlInput" placeholder="Paste target game URL...">
          <button class="btn-primary" id="updateLinkBtn">INJECT</button>
        </div>
      </div>
      <div class="control-box" style="display: flex; flex-direction: column;">
        <h3 style="color:var(--magenta);"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Market Logic</h3>
        <button id="reverseToggleBtn" class="btn-toggle">REVERSE MODE: OFF</button>
      </div>
    </section>

    <section class="table-container">
      <div class="table-header">
        <h3><i class="fa-solid fa-users-gear"></i> Live User Management</h3>
        <button class="btn-bulk" id="bulkApproveBtn"><i class="fa-solid fa-check-double"></i> BULK APPROVE SELECTED</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAllCheckbox" title="Select All"></th>
              <th>Game UID</th>
              <th>Status / Arrival</th>
              <th>Time Remaining</th>
              <th>Approve Timer</th>
              <th>Security Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyBNj71akpefcfEtn-SQfAcx-Pgwi8sUosg", authDomain: "teamdev-88676.firebaseapp.com", databaseURL: "https://teamdev-88676-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "teamdev-88676" };
    const app = initializeApp(firebaseConfig); const database = getDatabase(app);

    // Globals
    let allUsersData = {}; 
    const tableBody = document.getElementById('userTableBody');

    // 1. MANUAL ADD
    document.getElementById('manualAddBtn').addEventListener('click', async () => {
        const uid = document.getElementById('manualUidInput').value.trim();
        if(!/^6\d{6}$/.test(uid)) return alert("Invalid UID! Must be 7 digits starting with '6'.");
        const mins = prompt(`Approve UID ${uid} for how many minutes?`, "1440");
        if(mins !== null && !isNaN(mins)) {
            const exp = new Date(); exp.setMinutes(exp.getMinutes() + parseInt(mins));
            await set(ref(database, `users/${uid}`), { status: "ACTIVE", expiresAt: exp.toISOString(), isUrgent: false, createdAt: new Date().toISOString(), deviceId: null });
            document.getElementById('manualUidInput').value = '';
        }
    });

    // 2. INJECT URL & 3. REVERSE MODE & 4. KILL SWITCH
    document.getElementById('updateLinkBtn').addEventListener('click', async () => {
        const url = document.getElementById('gameUrlInput').value.trim();
        if(url) await set(ref(database, 'systemConfig/links/gameUrl'), url);
    });
    let isReverse = false; const reverseBtn = document.getElementById('reverseToggleBtn');
    onValue(ref(database, 'systemConfig/settings/reverseMode'), (snap) => {
        isReverse = snap.val() || false;
        reverseBtn.innerText = isReverse ? "REVERSE MODE: ACTIVE" : "REVERSE MODE: OFF";
        isReverse ? reverseBtn.classList.add('active') : reverseBtn.classList.remove('active');
    });
    reverseBtn.addEventListener('click', async () => await set(ref(database, 'systemConfig/settings/reverseMode'), !isReverse));
    document.getElementById('globalKillBtn').addEventListener('click', async () => {
        if(confirm("🚨 WARNING: BLOCK ALL USERS?")) {
            const snap = await get(ref(database, 'users'));
            if(snap.exists()) {
                const updates = {};
                Object.keys(snap.val()).forEach(uid => { updates[`${uid}/status`] = "BLOCKED"; updates[`${uid}/expiresAt`] = null; updates[`${uid}/blockReason`] = "SYSTEM PURGED"; });
                await update(ref(database, 'users'), updates);
            }
        }
    });

    // 5. COPY UID TO CLIPBOARD
    window.copyUID = function(uid) {
        navigator.clipboard.writeText(uid).then(() => {
            alert(`UID ${uid} copied to clipboard!`);
        });
    };

    // 6. SESSION ANALYTICS LOGIC
    window.calculateSession = function() {
        const start = document.getElementById('sessStart').value;
        const end = document.getElementById('sessEnd').value;
        if(!start || !end) return;
        
        let count = 0;
        const today = new Date().toISOString().split('T')[0]; // Current date
        const startTime = new Date(`${today}T${start}:00`).getTime();
        const endTime = new Date(`${today}T${end}:00`).getTime();

        Object.values(allUsersData).forEach(u => {
            if(u.createdAt) {
                const reqTime = new Date(u.createdAt).getTime();
                if(reqTime >= startTime && reqTime <= endTime) count++;
            }
        });
        document.getElementById('sessResult').innerText = `${count} Requests received between ${start} & ${end}`;
    };

    // SEARCH
    document.getElementById('searchInput').addEventListener('keyup', function() {
        const filter = this.value.toUpperCase(), trs = tableBody.getElementsByTagName('tr');
        for (let i = 0; i < trs.length; i++) {
            trs[i].style.display = (trs[i].innerText).toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
    });

    // 7. BULK APPROVE
    document.getElementById('selectAllCheckbox').addEventListener('change', function() {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        checkboxes.forEach(cb => cb.checked = this.checked);
    });
    document.getElementById('bulkApproveBtn').addEventListener('click', async () => {
        const checked = document.querySelectorAll('.row-checkbox:checked');
        if(checked.length === 0) return alert("Select at least one UID first!");
        
        const mins = prompt(`Approve ${checked.length} selected UIDs for how many minutes?`, "1440");
        if(mins !== null && !isNaN(mins)) {
            const updates = {};
            const exp = new Date(); exp.setMinutes(exp.getMinutes() + parseInt(mins));
            checked.forEach(cb => {
                updates[`${cb.value}/status`] = "ACTIVE";
                updates[`${cb.value}/expiresAt`] = exp.toISOString();
                updates[`${cb.value}/isUrgent`] = false;
            });
            await update(ref(database, 'users'), updates);
            document.getElementById('selectAllCheckbox').checked = false;
        }
    });

    function getTimeLeft(expiresAt) {
        if(!expiresAt) return `--`;
        const diff = new Date(expiresAt) - new Date();
        if(diff <= 0) return `<span style='color:var(--red); font-weight:900;'>CRASHED</span>`;
        return `<span style='color:var(--lime); font-family:"Share Tech Mono"; font-weight:bold;'>${Math.floor(diff / 60000)} MINS</span>`;
    }

    // MAIN DATA RENDER
    onValue(ref(database, 'users'), (snapshot) => {
        tableBody.innerHTML = ''; let tTot=0, tAct=0, tPen=0, tUrg=0;
        
        if (snapshot.exists()) {
            allUsersData = snapshot.val();
            
            // Device Abuse Pre-calculation
            const deviceCounts = {};
            Object.values(allUsersData).forEach(u => {
                if(u.deviceId) deviceCounts[u.deviceId] = (deviceCounts[u.deviceId] || 0) + 1;
            });

            // Advanced Sorting: Urgent -> PENDING (Oldest First) -> Others
            const sortedUIDs = Object.keys(allUsersData).sort((a,b)=>{
                let uA = allUsersData[a], uB = allUsersData[b];
                if(uA.isUrgent && !uB.isUrgent) return -1;
                if(!uA.isUrgent && uB.isUrgent) return 1;
                if(uA.status === "PENDING" && uB.status !== "PENDING") return -1;
                if(uA.status !== "PENDING" && uB.status === "PENDING") return 1;
                if(uA.status === "PENDING" && uB.status === "PENDING") {
                    return new Date(uA.createdAt) - new Date(uB.createdAt); // OLDEST FIRST
                }
                return 0;
            });

            sortedUIDs.forEach(uid => {
                const data = allUsersData[uid]; tTot++;
                if(data.status==="ACTIVE") tAct++; if(data.status==="PENDING") tPen++; if(data.isUrgent) tUrg++;
                
                // Color Degradation (Heatmap for Pending)
                let rowClass = "";
                if (data.status === "PENDING" && data.createdAt) {
                    const ageMins = (Date.now() - new Date(data.createdAt).getTime()) / 60000;
                    if(ageMins > 180) rowClass = "row-heat-red"; // > 3 Hrs
                    else if(ageMins > 120) rowClass = "row-heat-orange"; // > 2 Hrs
                    else if(ageMins > 30) rowClass = "row-heat-yellow"; // > 30 Mins
                }

                // Device Abuse Warning
                let multiWarning = "";
                if(data.deviceId && deviceCounts[data.deviceId] > 1) {
                    multiWarning = `<div class="multi-acc-warning"><i class="fa-solid fa-triangle-exclamation"></i> MULTI-ACCOUNT SUSPECT</div>`;
                }

                const createdTime = data.createdAt ? new Date(data.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Unknown";

                const tr = document.createElement('tr');
                if(rowClass) tr.className = rowClass;
                
                tr.innerHTML = `
                    <td><input type="checkbox" class="row-checkbox" value="${uid}"></td>
                    <td style="font-family:'Share Tech Mono'; font-weight:900; font-size:18px;">
                        <span class="uid-text" onclick="window.copyUID('${uid}')" title="Click to Copy"><i class="fa-regular fa-copy"></i> ${uid}</span>
                        ${data.isUrgent ? `<span class="urgent-pulse">URGENT</span>` : ""}
                        <br>${multiWarning}
                    </td>
                    <td>
                        <span class="badge ${data.status.toLowerCase()}">${data.status}</span>
                        <div style="font-size:11px; color:#888; margin-top:4px;">Arrived: ${createdTime}</div>
                    </td>
                    <td>${getTimeLeft(data.expiresAt)}</td>
                    <td><div class="action-group">
                        <button class="btn-sm btn-approve" onclick="window.manageUser('${uid}', 15)">15M</button>
                        <button class="btn-sm btn-approve" onclick="window.manageUser('${uid}', 60)">1H</button>
                        <button class="btn-sm btn-approve" onclick="window.manageUser('${uid}', 1440)">24H</button>
                    </div></td>
                    <td><div class="action-group">
                        <button class="btn-sm btn-danger" onclick="window.blockUser('${uid}')"><i class="fa-solid fa-ban"></i></button>
                        <button class="btn-sm btn-warning" onclick="window.resetDevice('${uid}')" title="Reset Device Bind"><i class="fa-solid fa-unlock"></i></button>
                        <button class="btn-sm btn-del" onclick="window.deleteUser('${uid}')"><i class="fa-regular fa-trash-can"></i></button>
                    </div></td>
                `;
                tableBody.appendChild(tr);
            });
        }
        document.getElementById('statTotal').innerText = tTot; document.getElementById('statActive').innerText = tAct;
        document.getElementById('statPending').innerText = tPen; document.getElementById('statUrgent').innerText = tUrg;
    });

    window.manageUser = async (uid, mins) => {
        const exp = new Date(); exp.setMinutes(exp.getMinutes() + mins);
        await update(ref(database, `users/${uid}`), { status: "ACTIVE", expiresAt: exp.toISOString(), isUrgent: false });
    };
    window.blockUser = async (uid) => {
        const r = prompt("Block reason:", "RULES VIOLATION");
        if(r) await update(ref(database, `users/${uid}`), { status: "BLOCKED", expiresAt: null, isUrgent: false, blockReason: r.toUpperCase() });
    };
    window.resetDevice = async (uid) => {
        if(confirm(`Reset device bind for ${uid}?`)) await update(ref(database, `users/${uid}`), { deviceId: null });
    };
    window.deleteUser = async (uid) => {
        if(confirm(`Erase ${uid}?`)) await remove(ref(database, `users/${uid}`));
    };
    setInterval(() => { document.dispatchEvent(new Event('change')); }, 60000);
  </script>
</body>
</html>
