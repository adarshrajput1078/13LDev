    window.API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json"; 

    const fullOverlay = document.getElementById('fullOverlayScreen'); const loginFormCard = document.getElementById('loginFormCard');
    const historyAuthCard = document.getElementById('historyAuthCard'); const historyViewCard = document.getElementById('historyViewCard');
    const mainApp = document.getElementById('mainApp'); const errBox = document.getElementById('errorPopup'); const histErrBox = document.getElementById('histErrorPopup');
    const analyzeBtn = document.getElementById('analyzeBtn'); const resBox = document.getElementById('resBox');

    // STATE VARIABLES FOR VIP/FREE LOGIC
    let isUserVIP = false;
    let playSeconds = 0;
    let cooldownSeconds = 300; // 5 mins cooldown
    let inCooldown = false;
    let sessionTimerInterval = null;

    function createParticles() {
        const container = document.getElementById('particlesContainer');
        for(let i=0; i<12; i++) {
            let p = document.createElement('div'); p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            p.style.animationDelay = (Math.random() * 3) + 's';
            container.appendChild(p);
        }
    }
    createParticles();

    window.showHistoryAuth = () => { loginFormCard.style.display='none'; historyAuthCard.style.display='block'; historyViewCard.style.display='none'; histErrBox.style.display='none'; }
    window.hideHistoryAuth = () => { historyAuthCard.style.display='none'; historyViewCard.style.display='none'; loginFormCard.style.display='block'; }

    onValue(ref(database, 'systemConfig/links'), (snapshot) => {
      if(snapshot.exists()) {
        const links = snapshot.val();
        if(links.gameUrl) document.getElementById('gameIframe').src = links.gameUrl;
        if(links.supportUrl && document.getElementById('supportBtn')) document.getElementById('supportBtn').href = links.supportUrl;
      }
    });

    // ==========================================
    // STEP 1: KEY LOGIN & SESSION START
    // ==========================================
    document.getElementById('activateBtn').addEventListener('click', async () => {
      const key = document.getElementById('loginKey').value.trim().toUpperCase(); 
      if(!key) { errBox.style.display='block'; errBox.innerText="ENTER ACCESS KEY"; return; }

      document.getElementById('activateBtn').innerText = "VERIFYING...";
      try {
        const snap = await get(child(ref(database), `keys/${key}`));
        if(snap.exists()) {
          const kData = snap.val();
          if(kData.status === "INACTIVE" || kData.status === "BANNED") {
             errBox.style.display='block'; errBox.innerText="KEY IS INACTIVE/BANNED"; document.getElementById('activateBtn').innerText="VERIFY LICENSE"; return;
          }
          if(kData.expiresAt && new Date() > new Date(kData.expiresAt)) {
             errBox.style.display='block'; errBox.innerText="KEY HAS EXPIRED"; document.getElementById('activateBtn').innerText="VERIFY LICENSE"; return;
          }
          
          if(kData.status === "UNUSED") {
              const exp = new Date(); exp.setHours(exp.getHours() + (kData.validityHours || 24));
              await update(ref(database, `keys/${key}`), { status: "ACTIVE", expiresAt: exp.toISOString() });
          }

          // Check if VIP or Trial/Free
          let kType = (kData.type || 'FREE').toUpperCase();
          isUserVIP = kType === 'VIP';
          document.getElementById('widgetAccessType').innerText = isUserVIP ? 'VIP ACCESS' : 'TRIAL MODE';
          if(!isUserVIP) {
              document.getElementById('widgetAccessType').style.color = '#ff004c';
              document.getElementById('widgetAccessType').style.borderColor = '#ff004c';
              document.getElementById('widgetAccessType').style.background = 'rgba(255,0,76,0.1)';
          }

          fullOverlay.style.display = 'none';
          mainApp.style.display = 'block';
          analyzeBtn.disabled = false; analyzeBtn.innerHTML = "<i class='fa-solid fa-bolt'></i> PREDICT"; 
          resBox.innerHTML = `<div class="res-ready">CONNECT TO ISSUE</div>`;
          initEngine();
          startSessionTimer(); // Start Silent Tracking
          toggleWidget();

        } else { errBox.style.display='block'; errBox.innerText="INVALID ACCESS KEY"; document.getElementById('activateBtn').innerText="VERIFY LICENSE"; }
      } catch(e) { errBox.style.display='block'; errBox.innerText="NETWORK ERROR"; document.getElementById('activateBtn').innerText="VERIFY LICENSE"; }
    });

    // SILENT PLAY TIMER & COOLDOWN LOGIC
    function formatTime(secs) {
        let m = Math.floor(secs/60); let s = secs%60;
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    
    function startSessionTimer() {
        sessionTimerInterval = setInterval(() => {
            if(inCooldown) {
                cooldownSeconds--;
                document.getElementById('cooldownTimerDisplay').innerText = formatTime(cooldownSeconds);
                if(cooldownSeconds <= 0) {
                    inCooldown = false;
                    document.getElementById('trialCooldownOverlay').style.display = 'none';
                    cooldownSeconds = 300; // Reset for next cooldown
                    playSeconds = 0; // Reset playtime
                }
                return;
            }

            playSeconds++; // Counting silently in background
            
            // Restrict Free Users after 5 Minutes (300 secs)
            if(!isUserVIP && playSeconds >= 300) {
                inCooldown = true;
                document.getElementById('trialCooldownOverlay').style.display = 'flex';
            }
        }, 1000);
    }

    // ==========================================
    // PREVIOUS RESULT VIEWER
    // ==========================================
    document.getElementById('authUidBtn').addEventListener('click', async () => {
      const uid = document.getElementById('historyUidInput').value.trim(); 
      if(uid.length !== 7 || uid.charAt(0) !== '6') { histErrBox.style.display='block'; histErrBox.innerText="INVALID UID FORMAT"; return; }

      const btn = document.getElementById('authUidBtn'); btn.innerText = "AUTHENTICATING..."; histErrBox.style.display='none';
      try {
          const reqSnap = await get(child(ref(database), `server/approvedUids/${uid}`));
          if(reqSnap.exists()) {
              historyAuthCard.style.display = 'none'; historyViewCard.style.display = 'block';
              document.getElementById('logUidDisplay').innerText = uid;
              loadPreviousHistory();
          } else { histErrBox.style.display='block'; histErrBox.innerText = "ACCESS DENIED: UID NOT WHITELISTED."; }
      } catch(e) { histErrBox.style.display='block'; histErrBox.innerText="SERVER ERROR"; }
      finally { btn.innerText = "VERIFY IDENTITY"; }
    });

    async function loadPreviousHistory() {
        const listDiv = document.getElementById('historyListContent');
        listDiv.innerHTML = '<div style="color:var(--tc-neon-ice); font-family:Share Tech Mono; font-size:12px; text-align:center; margin-top:20px;">FETCHING LOGS...</div>';
        try {
            const res = await fetch(`${window.API_URL}?ts=${Date.now()}`, { headers: {'Accept':'application/json'} }); 
            const json = await res.json();
            const draws = json.data.list.map(i => ({ issueNumber: String(i.issueNumber), number: parseInt(i.number), size: parseInt(i.number) >= 5 ? "BIG" : "SMALL" })).filter(d => !isNaN(d.number));
            const currentIssue = (BigInt(draws[0].issueNumber) + 1n).toString();
            
            let html = `<div class="hist-row"><div class="hist-period">ISSUE: ${currentIssue}</div><div class="hist-status" style="color:#888;">IN PROGRESS...</div></div>`;

            draws.slice(0, 15).forEach((d) => {
                let charCodeSum = d.issueNumber.split('').reduce((sum, char) => sum + char.charCodeAt(0), 0);
                let isJackpot = charCodeSum % 8 === 0; let isLoss = !isJackpot && charCodeSum % 7 === 0; 
                let statusHtml = isJackpot ? '<span class="s-jackpot">JACKPOT</span>' : (isLoss ? '<span class="s-loss">MISS</span>' : '<span class="s-win">WIN</span>');
                let actualColor = [2,4,6,8].includes(d.number) ? 'RED' : ([1,3,7,9].includes(d.number) ? 'GREEN' : 'VIOLET');
                html += `<div class="hist-row"><div><div class="hist-period">${d.issueNumber}</div><div class="hist-res">Res: <span>${d.number} (${d.size} / ${actualColor})</span></div></div><div class="hist-status">${statusHtml}</div></div>`;
            });
            listDiv.innerHTML = html;
        } catch(e) { listDiv.innerHTML = '<div style="color:#ff004c; font-family:Share Tech Mono; font-size:12px; text-align:center; margin-top:20px;">FAILED TO LOAD LOGS</div>'; }
    }

    // ==========================================
    // WIDGET DRAG & HIDE LOGIC
    // ==========================================
    const container = document.getElementById("draggableWidget"); const iconCollapsed = document.getElementById("modIcon"); const expandedBox = document.getElementById("modExpanded");
    let isDragging = false, hasMoved = false, startX, startY, initialX, initialY;
    function enforceScreenBounds() { const rect = container.getBoundingClientRect(); let newLeft = Math.max(0, Math.min(rect.left, window.innerWidth - rect.width)); let newTop = Math.max(20, Math.min(rect.top, window.innerHeight - rect.height - 20)); container.style.transform = `translate3d(${newLeft}px, ${newTop}px, 0)`; container.style.left = '0'; container.style.top = '0'; }
    function toggleWidget() { if(expandedBox.classList.contains('active')) { expandedBox.classList.remove('active'); iconCollapsed.classList.remove('hidden'); } else { iconCollapsed.classList.add('hidden'); expandedBox.classList.add('active'); } setTimeout(enforceScreenBounds, 20); }
    
    iconCollapsed.addEventListener('click', () => { if(!hasMoved) toggleWidget(); }); 
    
    // FREE KEY: NO MINIMIZE ALLOWED
    document.getElementById('hideBtn').addEventListener('click', () => {
        if(!isUserVIP) {
            alert("Minimizing widget is locked for Trial Keys. Upgrade to VIP.");
            return;
        }
        toggleWidget(); 
    }); 
    
    window.addEventListener('resize', enforceScreenBounds);
    
    function dragStart(e) { if(e.target.closest('.action-row')) return; initialX = (e.type === "touchstart") ? e.touches[0].clientX : e.clientX; initialY = (e.type === "touchstart") ? e.touches[0].clientY : e.clientY; const style = window.getComputedStyle(container); const matrix = new WebKitCSSMatrix(style.transform); startX = initialX - matrix.m41; startY = initialY - matrix.m42; isDragging = true; hasMoved = false; }
    function drag(e) { if (!isDragging) return; const currentX = (e.type === "touchmove") ? e.touches[0].clientX : e.clientX; const currentY = (e.type === "touchmove") ? e.touches[0].clientY : e.clientY; if (Math.abs(currentX - initialX) > 4 || Math.abs(currentY - initialY) > 4) { hasMoved = true; e.preventDefault(); let newX = currentX - startX; let newY = currentY - startY; newX = Math.max(0, Math.min(newX, window.innerWidth - container.offsetWidth)); newY = Math.max(20, Math.min(newY, window.innerHeight - container.offsetHeight - 20)); container.style.transform = `translate3d(${newX}px, ${newY}px, 0)`; } }
    function dragEnd() { isDragging = false; }
    container.addEventListener("touchstart", dragStart, { passive: false }); document.addEventListener("touchmove", drag, { passive: false }); document.addEventListener("touchend", dragEnd); container.addEventListener("mousedown", dragStart); document.addEventListener("mousemove", drag); document.addEventListener("mouseup", dragEnd);

    setInterval(() => { const now = new Date(); let secLeft = 60 - now.getSeconds(); if(secLeft === 60) secLeft = 0; const timerEl = document.getElementById('countdownTimer'); if(timerEl) timerEl.innerText = `00:${secLeft < 10 ? '0'+secLeft : secLeft}`; }, 1000);

    // 🔥 100% REAL WINGO COLOR LOGIC 🔥
    function getSizeFromNumber(num) { if (num === undefined || num === null) return null; return num >= 5 ? "BIG" : "SMALL"; }
    function getBallClass(num) { 
        if(num === 0) return 'bg-red-violet';
        if(num === 5) return 'bg-green-violet';
        if([2,4,6,8].includes(num)) return 'bg-red'; 
        if([1,3,7,9].includes(num)) return 'bg-green'; 
        return 'bg-red'; 
    }
    
    function generateAIPrediction(historyArray) {
      let predictedSize = "BIG"; let sure1 = 5, sure2 = 8;
      const validDraws = (historyArray || []).filter(d => d !== undefined && d.number !== undefined && !isNaN(d.number)).slice(0, 20);
      if (validDraws.length === 0) return { predictionSize: "BIG", sureNumbers: [6, 9] };
      const recent = [...validDraws].slice(0, 12); const recentSizes = recent.map(r => getSizeFromNumber(r.number)).filter(s => s !== null); const recentNumbers = recent.map(r => r.number);
      if (recentSizes.length >= 3) {
        let streakLength = 1; for (let i = 1; i < recentSizes.length; i++) { if (recentSizes[i] === recentSizes[0]) streakLength++; else break; }
        if (streakLength >= 3) { predictedSize = recentSizes[0] === "BIG" ? "SMALL" : "BIG"; } else {
          const last7 = recentSizes.slice(0, 7); const bigCount = last7.filter(s => s === "BIG").length; const smallCount = last7.filter(s => s === "SMALL").length;
          if (bigCount > smallCount + 1) predictedSize = "SMALL"; else if (smallCount > bigCount + 1) predictedSize = "BIG"; else { predictedSize = recentSizes[0] === "BIG" ? "SMALL" : "BIG"; }
        }
      } else { predictedSize = Math.random() > 0.5 ? "BIG" : "SMALL"; }
      const targetPool = predictedSize === "BIG" ? [5,6,7,8,9] : [0,1,2,3,4];
      sure1 = targetPool[Math.floor(Math.random()*targetPool.length)]; sure2 = targetPool[Math.floor(Math.random()*targetPool.length)];
      if(sure1 === sure2) sure2 = targetPool[(targetPool.indexOf(sure1)+1)%5];
      return { predictionSize: predictedSize, sureNumbers: [sure1, sure2] };
    }

    function showJackpotToast(msg) { const toast = document.createElement('div'); toast.className = 'jackpot-toast'; toast.innerText = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

    let fetchingLock = false; let internalLatestPeriod = null; let activePrediction = null; let predictedPeriodId = null; 
    let currentGodMode = { size: "AUTO" }; onValue(ref(database, 'server/override'), (snap) => { if(snap.exists()) currentGodMode = snap.val(); else currentGodMode = { size: "AUTO" }; });

    async function fetchAndProcess() {
      if(fetchingLock) return; fetchingLock = true;
      try {
        const res = await fetch(`${window.API_URL}?ts=${Date.now()}`, { headers: {'Accept':'application/json'} }); const json = await res.json();
        const draws = json.data.list.map(i => ({ issueNumber: String(i.issueNumber), number: parseInt(i.number), size: parseInt(i.number) >= 5 ? "BIG" : "SMALL" })).filter(d => !isNaN(d.number));
        const latest = draws[0]; const nextPeriodId = (BigInt(latest.issueNumber) + 1n).toString();
        
        let justEvaluated = false;
        if(predictedPeriodId === latest.issueNumber) {
            const isSizeWin = (latest.size === activePrediction.predictionSize); const isJackpot = activePrediction.sureNumbers.includes(latest.number);
            expandedBox.classList.remove('anim-win', 'anim-loss'); void expandedBox.offsetWidth; 
            if(isSizeWin) expandedBox.classList.add('anim-win'); else expandedBox.classList.add('anim-loss');
            if(isJackpot) showJackpotToast(`🔥 JACKPOT: NUMBER ${latest.number} DRAWN!`);
            predictedPeriodId = null; justEvaluated = true;
        }

        if(internalLatestPeriod !== nextPeriodId) {
          internalLatestPeriod = nextPeriodId; document.getElementById('periodBadge').textContent = nextPeriodId.slice(-4); 
          
          if(currentGodMode.size !== "AUTO") {
             let forcedSize = currentGodMode.size;
             if(forcedSize === "SKIP") activePrediction = { predictionSize: "SKIP", sureNumbers: [0,0] };
             else activePrediction = { predictionSize: forcedSize, sureNumbers: forcedSize === "BIG" ? [7,9] : [1,3] };
          } else {
             activePrediction = generateAIPrediction(draws);
          }
          
          analyzeBtn.disabled = false; analyzeBtn.innerHTML = "<i class='fa-solid fa-bolt'></i> PREDICT"; 
          if(!justEvaluated && !predictedPeriodId) { 
              resBox.innerHTML = `<div class="res-ready">READY</div>`; 
              document.getElementById('trendFill').style.width = "0%"; document.getElementById('aiMsg').innerText = "System Standing By..."; expandedBox.classList.remove('anim-win', 'anim-loss'); 
          }
        }
      } catch(e) { } finally { fetchingLock = false; }
    }

    analyzeBtn.addEventListener('click', () => {
      if(!activePrediction || predictedPeriodId === internalLatestPeriod) return; 
      analyzeBtn.disabled = true; predictedPeriodId = internalLatestPeriod; expandedBox.classList.remove('anim-win', 'anim-loss');
      
      resBox.innerHTML = `<div class="laser-overlay"><div class="laser-line"></div><span class="scanning-text">SCANNING...</span></div>`;
      document.getElementById('aiMsg').innerText = "Analyzing Trend...";
      
      setTimeout(() => {
          // FREE KEY RESTRICTION: RANDOM SKIPS (30% CHANCE)
          let isForcedSkip = false;
          if(!isUserVIP && Math.random() < 0.3) {
              isForcedSkip = true;
          }

          if(activePrediction.predictionSize === "SKIP" || isForcedSkip) {
              resBox.innerHTML = `<div class="res-ready" style="color:#888;">SKIP TRADE</div>`; 
              document.getElementById('aiMsg').innerText = isForcedSkip ? "TRIAL LIMIT: TRADE SKIPPED." : "Volatile Market. Skip Advised.";
          } else {
              const trendPower = Math.floor(Math.random() * 20) + 80; 
              document.getElementById('trendFill').style.width = trendPower + "%";
              
              let probMain = Math.floor(Math.random() * 15) + 85; 
              let probSec = Math.floor(Math.random() * 16) + 60;  
              
              let sizeClass = activePrediction.predictionSize === 'SMALL' ? 'size-small' : 'size-big';
              
              resBox.innerHTML = `
                <div class="hack-result-row">
                    <div class="num-block">
                        <div class="num-val ${getBallClass(activePrediction.sureNumbers[0])}">${activePrediction.sureNumbers[0]}</div>
                        <div class="num-prob prob-high">${probMain}%</div>
                    </div>
                    <div class="size-block">
                        <div class="size-val ${sizeClass}">${activePrediction.predictionSize}</div>
                    </div>
                    <div class="num-block">
                        <div class="num-val ${getBallClass(activePrediction.sureNumbers[1])}">${activePrediction.sureNumbers[1]}</div>
                        <div class="num-prob">${probSec}%</div>
                    </div>
                </div>`;
              document.getElementById('aiMsg').innerText = `Prediction Loaded. Accuracy: ${trendPower}%`;
          }
          analyzeBtn.innerHTML = "<i class='fa-solid fa-check'></i> DONE";
      }, 1000); 
    });

    function initEngine() { fetchAndProcess(); setInterval(fetchAndProcess, 5000); }
  </script>
</body>
</html>
