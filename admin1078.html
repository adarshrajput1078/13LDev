<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER ADMIN | GOD CONTROL V53</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&family=Black+Ops+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* ==========================================================================
           1. ENTERPRISE ADMIN THEME VARIABLES
           ========================================================================== */
        :root {
            --bg-deep: #030408;
            --glass-bg: rgba(10, 14, 20, 0.95);
            --primary: #00ffcc;
            --primary-glow: rgba(0, 255, 204, 0.3);
            --magenta: #ff00ff;
            --danger: #ff003c;
            --danger-glow: rgba(255, 0, 60, 0.3);
            --success: #39ff14;
            --warning: #ffd700;
            --panel-border: rgba(0, 255, 204, 0.15);
            --text-main: #ffffff;
            --text-muted: #526b82;
            --sidebar-width: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif;}
        body { background-color: var(--bg-deep); color: var(--text-main); display: flex; height: 100vh; overflow: hidden;}

        /* ==========================================================================
           2. SIDEBAR NAVIGATION
           ========================================================================== */
        .sidebar { 
            width: var(--sidebar-width); 
            background: rgba(5,7,12,0.95); 
            border-right: 1px solid var(--panel-border); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0; 
            box-shadow: 5px 0 20px rgba(0,0,0,0.8); 
            z-index: 10;
        }
        .nav-brand { 
            font-size: 26px; 
            color: var(--magenta); 
            margin-bottom: 40px; 
            text-shadow: 0 0 10px var(--magenta); 
            animation: pulseBrand 2s infinite alternate;
        }
        @keyframes pulseBrand { 100% { filter: drop-shadow(0 0 15px var(--magenta)); transform: scale(1.05); } }

        .nav-btn { 
            width: 50px; height: 50px; 
            border-radius: 12px; background: transparent; 
            border: 1px solid transparent; color: var(--text-muted); 
            font-size: 20px; cursor: pointer; transition: 0.3s; 
            margin-bottom: 15px; display: flex; justify-content: center; align-items: center;
        }
        .nav-btn.active { 
            background: rgba(0,255,204,0.1); 
            border-color: var(--primary); 
            color: var(--primary); 
            box-shadow: inset 0 0 15px rgba(0,255,204,0.2);
        }
        .nav-btn:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.05); }

        /* ==========================================================================
           3. MAIN DASHBOARD CONTENT AREA
           ========================================================================== */
        .main-content { 
            flex: 1; overflow-y: auto; padding: 30px; 
            background: radial-gradient(circle at top right, rgba(26,0,51,0.5) 0%, var(--bg-deep) 100%); 
            scrollbar-width: none;
            position: relative;
        }
        .main-content::-webkit-scrollbar { display: none; }
        
        .tab-panel { display: none; animation: fadeIn 0.4s ease; max-width: 1100px; margin: 0 auto;}
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { 
            font-family: 'Orbitron'; font-size: 26px; font-weight: 900; 
            margin-bottom: 25px; text-transform: uppercase; 
            border-bottom: 1px dashed rgba(255,255,255,0.1); 
            padding-bottom: 15px; color: #fff; letter-spacing: 2px;
        }
        .page-header i { color: var(--primary); margin-right: 12px;}

        /* Glassmorphism Panels */
        .glass-panel { 
            background: var(--glass-bg); 
            border: 1px solid var(--panel-border); 
            border-radius: 16px; padding: 25px; margin-bottom: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,255,204,0.02); 
            position: relative;
        }
        .panel-title { 
            font-family: 'Space Mono'; font-size: 15px; color: var(--primary); 
            margin-bottom: 20px; font-weight: bold; letter-spacing: 2px;
        }

        /* Forms & Inputs */
        .input-group { margin-bottom: 20px;}
        .input-group label { 
            display: block; font-family: 'Orbitron'; font-size: 11px; 
            color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px;
        }
        .form-control { 
            width: 100%; background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            padding: 15px; border-radius: 8px; font-family: 'Space Mono'; 
            font-size: 14px; outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: inset 0 0 10px var(--primary-glow);}
        
        .btn-massive { 
            width: 100%; padding: 16px; 
            background: linear-gradient(90deg, var(--primary), #00b38f); 
            color: #000; border: none; border-radius: 8px; 
            font-family: 'Orbitron'; font-weight: 900; font-size: 14px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px var(--primary-glow); transition: 0.2s;
        }
        .btn-massive:active { transform: scale(0.98); }
        .btn-danger { background: linear-gradient(90deg, var(--danger), #8b0000); color: #fff; box-shadow: 0 0 15px var(--danger-glow);}

        /* ==========================================================================
           4. UID MATRIX (CARDS & ACTIONS)
           ========================================================================== */
        .uid-card { 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); 
            border-left: 4px solid var(--text-muted); border-radius: 10px; 
            padding: 18px; margin-bottom: 12px; display: flex; 
            justify-content: space-between; align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .uid-card:hover { background: rgba(255,255,255,0.02); }
        
        /* Status Colors */
        .uid-card.PENDING { border-left-color: var(--warning); }
        .uid-card.ACTIVE { border-left-color: var(--success); }
        .uid-card.BANNED { border-left-color: var(--danger); opacity: 0.6;}

        .uid-info h2 { font-family: 'Space Mono'; font-size: 20px; color: #fff; margin-bottom: 6px; letter-spacing: 2px;}
        .uid-info p { font-size: 12px; color: var(--text-muted); font-weight: bold; letter-spacing: 1px;}
        
        .device-tag { 
            font-size: 10px; color: var(--primary); background: rgba(0,255,204,0.1); 
            padding: 3px 8px; border-radius: 4px; display: inline-block; 
            margin-top: 6px; border: 1px solid rgba(0,255,204,0.2); font-family: 'Space Mono';
        }
        
        .uid-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end;}
        .uid-actions select { 
            background: #000; border: 1px solid var(--primary); color: #fff; 
            padding: 10px; border-radius: 6px; outline: none; 
            font-family: 'Space Mono'; font-size: 12px;
        }
        .action-btn { 
            padding: 10px 16px; border: none; border-radius: 6px; 
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; 
            font-size: 12px; letter-spacing: 1px; transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.95); }
        .btn-appr { background: var(--success); color: #000; box-shadow: 0 0 10px rgba(57,255,20,0.3);}
        .btn-ban { background: var(--danger); color: #fff; box-shadow: 0 0 10px var(--danger-glow);}
        .btn-del { background: #222; color: #fff; border: 1px solid rgba(255,255,255,0.1);}

        /* Empty State */
        .empty-state { text-align: center; color: var(--text-muted); font-family: 'Space Mono'; padding: 60px 20px; font-size: 14px; letter-spacing: 2px;}

        /* ==========================================================================
           5. SYSTEM TOAST ALERTS
           ========================================================================== */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: rgba(10,14,20,0.95); border: 1px solid var(--primary); 
            padding: 15px 30px; border-radius: 30px; color: #fff; 
            font-family: 'Space Mono'; font-size: 12px; font-weight: bold; 
            z-index: 99999; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-transform: uppercase; box-shadow: 0 10px 30px var(--primary-glow);
            display: flex; align-items: center; gap: 10px;
        }
        #toast i { font-size: 16px; color: var(--primary); }
        #toast.show { top: 40px; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .uid-card { flex-direction: column; align-items: flex-start; gap: 15px;}
            .uid-actions { width: 100%; justify-content: flex-start;}
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-brand"><i class="fa-solid fa-microchip"></i></div>
        <button class="nav-btn active" onclick="AdminCore.switchTab('tabUids')" title="Node Manager"><i class="fa-solid fa-users"></i></button>
        <button class="nav-btn" onclick="AdminCore.switchTab('tabComm')" title="Command Center"><i class="fa-solid fa-tower-broadcast"></i></button>
        <button class="nav-btn" onclick="AdminCore.switchTab('tabConfig')" title="System Config"><i class="fa-solid fa-gears"></i></button>
    </div>

    <div class="main-content">
        <div id="toast"><i class="fa-solid fa-check-circle"></i> <span id="toastMsg">SYSTEM UPDATED</span></div>

        <div class="tab-panel active" id="tabUids">
            <div class="page-header"><i class="fa-solid fa-users"></i> LIVE NODE MATRIX</div>
            
            <div class="glass-panel" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; flex-wrap: wrap; gap: 15px;">
                <span style="font-family: 'Space Mono'; color: var(--warning); font-size: 12px; display: flex; align-items: center; gap: 10px;">
                    <i class="fa-solid fa-broom" style="font-size: 16px;"></i> Deep clean server cache. Removes banned/expired nodes.
                </span>
                <button class="action-btn btn-del" onclick="AdminCore.purgeDatabase()" style="padding: 12px 25px;">
                    <i class="fa-solid fa-trash-can"></i> PURGE DATABASE
                </button>
            </div>

            <div class="glass-panel">
                <div class="panel-title"><i class="fa-solid fa-server"></i> PENDING & ACTIVE CONNECTIONS</div>
                <div id="uidListContainer">
                    <div class="empty-state"><i class="fa-solid fa-circle-notch fa-spin" style="margin-bottom:15px; font-size:24px;"></i><br>SYNCING DATABASE...</div>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tabComm">
            <div class="page-header"><i class="fa-solid fa-tower-broadcast"></i> COMMAND CENTER</div>
            
            <div class="glass-panel">
                <div class="panel-title"><i class="fa-solid fa-terminal"></i> DIRECT IN-APP COMMANDS</div>
                
                <div class="input-group">
                    <label>TARGET NODE (AUDIENCE)</label>
                    <select id="msgTarget" class="form-control">
                        <option value="ALL">📢 GLOBAL BROADCAST (ALL ACTIVE USERS)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>EXECUTION TYPE</label>
                    <select id="msgType" class="form-control" style="border-color: var(--warning);">
                        <option value="INFO">🟢 INFO: Floating Scrolling Marquee</option>
                        <option value="LOCK">🔴 FREEZE: Lock Prediction UI (Forces Deposit/Action)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>PAYLOAD CONTENT (MESSAGE)</label>
                    <input type="text" id="msgText" class="form-control" placeholder="e.g. Action required. Please re-deposit and send screenshot.">
                </div>

                <div class="input-group">
                    <label>PAYLOAD DURATION (AUTO-DESTRUCT)</label>
                    <select id="msgDuration" class="form-control">
                        <option value="5">5 MINUTES</option>
                        <option value="60">1 HOUR</option>
                        <option value="999999">PERMANENT (UNTIL MANUALLY CLEARED)</option>
                    </select>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button class="btn-massive" onclick="AdminCore.sendCustomMessage()">
                        <i class="fa-solid fa-paper-plane"></i> DEPLOY COMMAND
                    </button>
                    <button class="btn-massive btn-danger" onclick="AdminCore.clearCustomMessage()">
                        <i class="fa-solid fa-eraser"></i> CLEAR (UNLOCK NODE)
                    </button>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tabConfig">
            <div class="page-header"><i class="fa-solid fa-gears"></i> SYSTEM CONFIGURATION</div>

            <div class="glass-panel">
                <div class="panel-title"><i class="fa-solid fa-globe"></i> BACKGROUND GAME ROUTING</div>
                <div class="input-group">
                    <input type="text" id="gameUrlInput" class="form-control" placeholder="https://sikkim.com">
                </div>
                <button class="btn-massive" onclick="AdminCore.updateGameLink()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> UPDATE GAME URL
                </button>
            </div>

            <div class="glass-panel" style="border-color: var(--danger); box-shadow: inset 0 0 20px rgba(255,0,60,0.05);">
                <div class="panel-title" style="color: var(--danger);"><i class="fa-solid fa-triangle-exclamation"></i> GLOBAL MAINTENANCE LOCK</div>
                <div class="input-group">
                    <select id="sysMode" class="form-control" style="border-color: var(--danger);">
                        <option value="OPEN">🟢 SERVER ONLINE (OPERATIONAL)</option>
                        <option value="LOCKED">🔴 SERVER LOCKED (UNDER MAINTENANCE)</option>
                    </select>
                </div>
                <button class="btn-massive btn-danger" onclick="AdminCore.updateMaintenance()">
                    <i class="fa-solid fa-power-off"></i> APPLY SERVER STATE
                </button>
            </div>
            
            <div class="glass-panel" style="border-color: var(--warning); box-shadow: inset 0 0 20px rgba(255,215,0,0.05);">
                <div class="panel-title" style="color: var(--warning);"><i class="fa-solid fa-crosshairs"></i> ALGORITHM OVERRIDE (GOD MODE)</div>
                <div class="input-group">
                    <select id="godModeSize" class="form-control">
                        <option value="AUTO">AUTO (NATURAL MACHINE CALCULATION)</option>
                        <option value="BIG">FORCE ALL PREDICTIONS TO: BIG</option>
                        <option value="SMALL">FORCE ALL PREDICTIONS TO: SMALL</option>
                        <option value="SKIP">FORCE MARKET TO: VOLATILE (SKIP)</option>
                    </select>
                </div>
                <button class="btn-massive" style="background: linear-gradient(90deg, var(--warning), #b39700); color: #000;" onclick="AdminCore.updateGodMode()">
                    <i class="fa-solid fa-satellite-dish"></i> DEPLOY OVERRIDES
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        /**
         * ----------------------------------------------------------------------
         * FIREBASE CONFIGURATION
         * Ensure these credentials exactly match the User App
         * ----------------------------------------------------------------------
         */
        const FIREBASE_CONFIG = { 
            apiKey: "AIzaSyBNj71akpefcfEtn-SQfAcx-Pgwi8sUosg", 
            authDomain: "teamdev-88676.firebaseapp.com", 
            databaseURL: "https://teamdev-88676-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "teamdev-88676" 
        };
        const app = initializeApp(FIREBASE_CONFIG); 
        const database = getDatabase(app);

        /**
         * ----------------------------------------------------------------------
         * CORE ADMIN CONTROLLER NAMESPACE
         * Grouping functions under window.AdminCore to access them from HTML inline onclicks
         * ----------------------------------------------------------------------
         */
        window.AdminCore = {
            
            // UI Helpers
            switchTab: function(tabId) {
                document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                event.currentTarget.classList.add('active');
            },

            showToast: function(msg) {
                const toast = document.getElementById('toast');
                document.getElementById('toastMsg').innerText = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            },

            // ==========================================
            // MODULE: NODE (UID) MANAGEMENT
            // ==========================================
            initUidListener: function() {
                const container = document.getElementById('uidListContainer');
                const targetDropdown = document.getElementById('msgTarget');

                onValue(ref(database, 'live_uids'), (snapshot) => {
                    container.innerHTML = '';
                    targetDropdown.innerHTML = '<option value="ALL">📢 GLOBAL BROADCAST (ALL ACTIVE USERS)</option>';

                    if(snapshot.exists()) {
                        const data = snapshot.val();
                        // Sort by request time descending
                        const uidsArray = Object.values(data).sort((a,b) => b.requestTime - a.requestTime);
                        
                        uidsArray.forEach(uData => {
                            let status = uData.status;
                            let timeRemaining = "WAITING FOR APPROVAL";
                            
                            // Check Expiry Logic for UI
                            if(status === "ACTIVE" && uData.expiresAt) {
                                if(Date.now() > uData.expiresAt) {
                                    status = "EXPIRED";
                                } else {
                                    timeRemaining = `EXPIRES: ${new Date(uData.expiresAt).toLocaleString()}`;
                                }
                            }

                            // Add ACTIVE users to Command Center dropdown
                            if(status === "ACTIVE") {
                                let opt = document.createElement('option');
                                opt.value = uData.uid;
                                opt.innerText = `👤 TARGET: UID ${uData.uid}`;
                                targetDropdown.appendChild(opt);
                            }

                            // Build the UI Card
                            const card = document.createElement('div');
                            card.className = `uid-card ${status}`;
                            
                            // Determine color based on status
                            let statusColor = status === 'ACTIVE' ? 'var(--success)' : (status === 'PENDING' ? 'var(--warning)' : 'var(--danger)');

                            card.innerHTML = `
                                <div class="uid-info">
                                    <h2>${uData.uid}</h2>
                                    <p>STATUS: <span style="color:${statusColor}">${status}</span> | ${timeRemaining}</p>
                                    ${uData.deviceID ? `<span class="device-tag"><i class="fa-solid fa-mobile-screen-button"></i> DEVICE BOUND</span>` : ''}
                                </div>
                                <div class="uid-actions">
                                    ${status !== 'ACTIVE' ? `
                                    <select id="time_${uData.uid}">
                                        <option value="2">2 HOURS</option>
                                        <option value="12">12 HOURS</option>
                                        <option value="24">24 HOURS</option>
                                        <option value="720">30 DAYS</option>
                                    </select>
                                    <button class="action-btn btn-appr" onclick="AdminCore.approveUID('${uData.uid}')"><i class="fa-solid fa-check"></i> APPROVE</button>
                                    ` : `
                                    <button class="action-btn btn-ban" onclick="AdminCore.banUID('${uData.uid}')"><i class="fa-solid fa-ban"></i> BAN NODE</button>
                                    `}
                                    <button class="action-btn btn-del" title="Delete & Unbind Device" onclick="AdminCore.deleteUID('${uData.uid}')"><i class="fa-solid fa-trash"></i> UNBIND</button>
                                </div>
                            `;
                            container.appendChild(card);
                        });
                    } else { 
                        container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-database" style="font-size:30px; margin-bottom:15px; opacity:0.5;"></i><br>DATABASE IS EMPTY</div>'; 
                    }
                });
            },

            approveUID: function(uid) {
                const hours = parseInt(document.getElementById(`time_${uid}`).value);
                const expiryTime = Date.now() + (hours * 60 * 60 * 1000);
                update(ref(database, `live_uids/${uid}`), { status: "ACTIVE", expiresAt: expiryTime });
                this.showToast("NODE APPROVED & ALLOCATED");
            },
            
            banUID: function(uid) { 
                if(confirm(`Ban UID ${uid}? User will be locked out immediately.`)) { 
                    update(ref(database, `live_uids/${uid}`), { status: "BANNED" }); 
                    this.showToast("NODE BANNED"); 
                } 
            },
            
            deleteUID: function(uid) { 
                if(confirm(`Permanently Delete UID ${uid}? This will also unbind their hardware device.`)) { 
                    remove(ref(database, `live_uids/${uid}`)); 
                    this.showToast("NODE DELETED & DEVICE UNBOUND"); 
                } 
            },
            
            purgeDatabase: async function() {
                if(!confirm("CRITICAL WARNING: This will delete ALL Banned and Expired UIDs to clean up the database. Continue?")) return;
                
                try {
                    const snap = await get(ref(database, 'live_uids'));
                    if(snap.exists()) {
                        let updates = {};
                        Object.keys(snap.val()).forEach(uid => { 
                            let u = snap.val()[uid]; 
                            if(u.status === "BANNED" || (u.status === "ACTIVE" && u.expiresAt < Date.now())) {
                                updates[uid] = null; // Mark for deletion
                            }
                        });
                        await update(ref(database, 'live_uids'), updates); 
                        this.showToast("DATABASE CACHE CLEARED");
                    }
                } catch(e) {
                    this.showToast("ERROR DURING PURGE");
                }
            },

            // ==========================================
            // MODULE: COMMAND CENTER (MESSAGES)
            // ==========================================
            sendCustomMessage: async function() {
                const target = document.getElementById('msgTarget').value;
                const type = document.getElementById('msgType').value;
                const text = document.getElementById('msgText').value.trim();
                const durationMins = parseInt(document.getElementById('msgDuration').value);
                
                if(!text) return alert("Message payload cannot be empty.");
                
                const payload = { 
                    type: type, 
                    text: text, 
                    expiresAt: Date.now() + (durationMins * 60000) 
                };

                try {
                    if(target === "ALL") {
                        const snap = await get(ref(database, 'live_uids'));
                        if(snap.exists()) {
                            const updates = {};
                            Object.keys(snap.val()).forEach(uid => { 
                                updates[`${uid}/customMsg`] = payload; 
                            });
                            await update(ref(database, 'live_uids'), updates); 
                            this.showToast("GLOBAL PAYLOAD DEPLOYED");
                        }
                    } else { 
                        await update(ref(database, `live_uids/${target}/customMsg`), payload); 
                        this.showToast(`PAYLOAD DEPLOYED TO TARGET`); 
                    }
                    document.getElementById('msgText').value = ""; // Reset input
                } catch(e) {
                    this.showToast("FAILED TO DEPLOY COMMAND");
                }
            },

            clearCustomMessage: async function() {
                const target = document.getElementById('msgTarget').value;
                
                try {
                    if(target === "ALL") {
                        const snap = await get(ref(database, 'live_uids'));
                        if(snap.exists()) {
                            const updates = {}; 
                            Object.keys(snap.val()).forEach(uid => { 
                                updates[`${uid}/customMsg`] = null; 
                            });
                            await update(ref(database, 'live_uids'), updates); 
                            this.showToast("ALL COMMANDS REVOKED");
                        }
                    } else { 
                        await update(ref(database, `live_uids/${target}`), { customMsg: null }); 
                        this.showToast(`TARGET NODE UNLOCKED`); 
                    }
                } catch(e) {
                    this.showToast("FAILED TO REVOKE COMMAND");
                }
            },

            // ==========================================
            // MODULE: SYSTEM CONFIGURATION
            // ==========================================
            initSystemListeners: function() {
                get(ref(database, 'systemConfig/links/gameUrl')).then(s => { 
                    if(s.exists()) document.getElementById('gameUrlInput').value = s.val(); 
                });
                get(ref(database, 'systemConfig/maintenance/mode')).then(s => { 
                    if(s.exists()) document.getElementById('sysMode').value = s.val(); 
                });
                get(ref(database, 'server/override/size')).then(s => { 
                    if(s.exists()) document.getElementById('godModeSize').value = s.val(); 
                });
            },

            updateGameLink: function() { 
                const url = document.getElementById('gameUrlInput').value.trim();
                update(ref(database, 'systemConfig/links'), { gameUrl: url })
                    .then(() => this.showToast("ROUTING URL UPDATED")); 
            },
            
            updateMaintenance: function() { 
                const mode = document.getElementById('sysMode').value;
                update(ref(database, 'systemConfig/maintenance'), { mode: mode })
                    .then(() => this.showToast("SERVER STATE ENFORCED")); 
            },
            
            updateGodMode: function() { 
                const size = document.getElementById('godModeSize').value;
                update(ref(database, 'server/override'), { size: size })
                    .then(() => this.showToast("ALGORITHM OVERRIDE DEPLOYED")); 
            }
        };

        // Initialize Everything on Load
        document.addEventListener('DOMContentLoaded', () => {
            AdminCore.initUidListener();
            AdminCore.initSystemListeners();
        });

    </script>
</body>
</html>
