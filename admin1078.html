<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEV ARMY • GOD-MODE ADMIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Outfit:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    :root { 
      --tc-green: #18b660; --tc-red: #fb5b5b; --tc-gold: #fcd535; --tc-cyan: #00f3ff;
      --tc-dark: #0a0e14; --tc-card: #121822; --tc-border: #1e293b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--tc-dark); font-family: 'Inter', sans-serif; color: #fff; font-size: 13px; }

    #adminLoginOverlay { position: fixed; inset: 0; background: var(--tc-dark); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    .auth-card { background: var(--tc-card); border: 1px solid var(--tc-cyan); padding: 30px 20px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 0 40px rgba(0,243,255,0.1); }
    .auth-input { width: 100%; background: #000; border: 1px solid #333; color: var(--tc-cyan); padding: 14px; border-radius: 8px; font-family: 'Share Tech Mono'; font-size: 16px; text-align: center; outline: none; margin: 20px 0; -webkit-text-security: disc;}
    .auth-input:focus { border-color: var(--tc-cyan); }
    .btn-auth { width: 100%; background: var(--tc-cyan); color: #000; font-weight: 900; padding: 14px; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }

    #adminDashboard { display: none; flex-direction: column; height: 100vh; }
    .top-header { height: 60px; background: var(--tc-card); border-bottom: 1px solid var(--tc-border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0; }
    .header-left { font-family: 'Outfit'; font-size: 18px; font-weight: 900; color: #fff; }
    .header-left span { color: var(--tc-cyan); }
    .content-scroll { flex: 1; overflow-y: auto; padding: 20px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: var(--tc-card); border: 1px solid var(--tc-border); padding: 15px; border-radius: 10px; text-align: center; }
    .stat-title { font-size: 10px; color: #888; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: 900; font-family: 'Share Tech Mono'; color: var(--tc-cyan); }

    .layout-grid { display: flex; flex-direction: column; gap: 20px; }
    @media(min-width: 900px){ .layout-grid{flex-direction: row;} .controls-column{width: 350px;} .data-column{flex:1;} }
    
    .panel { background: var(--tc-card); border: 1px solid var(--tc-border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .panel-header { padding: 12px 15px; border-bottom: 1px solid var(--tc-border); font-weight: 800; font-size: 12px; color: #fff; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center;}
    .panel-body { padding: 15px; }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 10px; color: #888; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
    .form-control { width: 100%; background: var(--tc-dark); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; font-size: 12px; outline: none; }
    .form-control:focus { border-color: var(--tc-cyan); }

    .btn { background: #1e293b; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 11px; text-transform: uppercase; width: 100%;}
    .btn-primary { background: var(--tc-cyan); color: #000; }
    .btn-danger { background: rgba(251, 91, 91, 0.1); color: var(--tc-red); border: 1px solid var(--tc-red); }
    .btn-gold { background: linear-gradient(135deg, var(--tc-gold), #ff9900); color: #000; }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: left; }
    th { padding: 12px 15px; font-size: 10px; color: #888; background: #0a0e14; border-bottom: 1px solid var(--tc-border); }
    td { padding: 12px 15px; border-bottom: 1px solid var(--tc-border); font-family: 'Share Tech Mono'; font-size: 12px; }
    .badge { padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; font-family: 'Inter'; }
    .bg-green { background: rgba(24,182,96,0.1); color: var(--tc-green); border: 1px solid var(--tc-green);}
    .bg-red { background: rgba(251,91,91,0.1); color: var(--tc-red); border: 1px solid var(--tc-red);}
    
    .action-row { display: flex; gap: 5px; }
    .btn-sm { padding: 4px 8px; font-size: 9px; border-radius: 4px; border: 1px solid #333; background: transparent; color: #fff; cursor: pointer; }
    .toggle-group { display: flex; gap: 8px; margin-bottom: 10px; }
    .toggle-btn { flex: 1; padding: 8px; text-align: center; font-size: 10px; font-weight: 800; background: var(--tc-dark); border: 1px solid #333; color: #888; border-radius: 6px; cursor: pointer;}
    .toggle-btn.active { background: rgba(0,243,255,0.1); color: var(--tc-cyan); border-color: var(--tc-cyan); }
  </style>
</head>
<body>

  <div id="adminLoginOverlay">
    <div class="auth-card">
      <i class="fa-solid fa-fingerprint" style="font-size: 40px; color: var(--tc-cyan); margin-bottom: 10px;"></i>
      <h2 style="font-family: 'Outfit'; font-weight: 900; margin-bottom: 5px;">ROOT ACCESS</h2>
      <p style="font-size: 10px; color: #888;">ENTER MASTER PASSWORD</p>
      <input type="password" id="adminPass" class="auth-input">
      <button class="btn-auth" onclick="verifyAdmin()">AUTHORIZE</button>
    </div>
  </div>

  <div id="adminDashboard">
    <div class="top-header">
      <div class="header-left">DEV <span>ARMY</span> V8</div>
      <div style="font-size: 10px; color: var(--tc-green); border: 1px solid var(--tc-green); padding: 4px 8px; border-radius: 4px;">SYSTEM SECURE</div>
    </div>

    <div class="content-scroll">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-title">Total Keys</div><div class="stat-value" id="statTotalKeys">0</div></div>
        <div class="stat-card"><div class="stat-title">Bound Devices</div><div class="stat-value" id="statActiveBound">0</div></div>
      </div>

      <div class="layout-grid">
        <div class="controls-column">
          
          <div class="panel" style="border-top: 3px solid var(--tc-red);">
            <div class="panel-header" style="color: var(--tc-red);"><i class="fa-solid fa-skull"></i> GOD MODE (MANUAL OVERRIDE)</div>
            <div class="panel-body">
              <p style="font-size:10px; color:#888; margin-bottom:10px;">Forces the app to show your selected result.</p>
              <div class="form-group">
                <label>Prediction Result</label>
                <select id="godModeSize" class="form-control" style="color:var(--tc-red); font-weight:bold; border-color:var(--tc-red);">
                  <option value="AUTO">🤖 AUTO (Algorithm)</option>
                  <option value="BIG">🟢 FORCE BIG</option>
                  <option value="SMALL">🔴 FORCE SMALL</option>
                  <option value="SKIP">⚠️ FORCE SKIP</option>
                </select>
              </div>
              <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                  <label>Force Num 1</label>
                  <input type="number" id="godModeNum1" class="form-control" placeholder="0-9">
                </div>
                <div class="form-group" style="flex:1;">
                  <label>Force Num 2</label>
                  <input type="number" id="godModeNum2" class="form-control" placeholder="0-9">
                </div>
              </div>
              <button class="btn btn-danger" onclick="setGodMode()">INJECT OVERRIDE</button>
              <div id="godStatus" style="font-size:10px; text-align:center; margin-top:10px; font-family:'Share Tech Mono'; color:var(--tc-green);"></div>
            </div>
          </div>

          <div class="panel" style="border-top: 3px solid var(--tc-gold);">
            <div class="panel-header" style="color: var(--tc-gold);"><i class="fa-solid fa-key"></i> BULK KEY GENERATOR</div>
            <div class="panel-body">
              <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                  <label>Server</label>
                  <select id="kgTimeframe" class="form-control"><option value="1M">1 Minute</option><option value="30S">30 Seconds</option></select>
                </div>
                <div class="form-group" style="flex:1;">
                  <label>Expiry</label>
                  <select id="kgExpiry" class="form-control"><option value="1">1 Hour</option><option value="24">1 Day</option><option value="168" selected>7 Days</option></select>
                </div>
              </div>
              <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:2;">
                  <label>Alias Prefix</label>
                  <input type="text" id="kgUser" class="form-control" placeholder="VIP_User">
                </div>
                <div class="form-group" style="flex:1;">
                  <label>Amount</label>
                  <input type="number" id="kgCount" class="form-control" value="1" min="1" max="50">
                </div>
              </div>
              <button class="btn btn-gold" onclick="generateKeys()">GENERATE KEYS</button>
            </div>
          </div>

          <div class="panel" style="border-top: 3px solid var(--tc-cyan);">
            <div class="panel-header" style="color: var(--tc-cyan);"><i class="fa-solid fa-server"></i> APP CONFIGURATIONS</div>
            <div class="panel-body">
              <div class="form-group"><label>Game Link</label><input type="text" id="linkGame" class="form-control"></div>
              <div class="form-group"><label>Telegram Link</label><input type="text" id="linkTg" class="form-control"></div>
              
              <label style="font-size:10px; color:#888; font-weight:800; margin-bottom:5px; display:block;">SYSTEM LOCK (MAINTENANCE)</label>
              <div class="toggle-group">
                <button class="toggle-btn" id="maintOn" onclick="toggleMaint(true)">LOCKED</button>
                <button class="toggle-btn active" id="maintOff" onclick="toggleMaint(false)">OPEN</button>
              </div>
              <input type="text" id="sessionTime" class="form-control" placeholder="Next Session Time" style="margin-bottom:10px;">
              <button class="btn btn-primary" onclick="saveSystemControls()">SYNC TO ALL USERS</button>
            </div>
          </div>
        </div>

        <div class="data-column">
          <div class="panel">
            <div class="panel-header">DATABASE VAULT <button class="btn-sm" style="background:var(--tc-cyan); color:#000; border:none;" onclick="loadVault()">REFRESH</button></div>
            <div class="panel-body" style="padding-bottom:0;">
              <input type="text" id="searchInput" class="form-control" placeholder="Search keys..." style="margin-bottom:15px;" onkeyup="searchVault()">
            </div>
            <div class="table-container">
              <table id="keyTable">
                <thead><tr><th>Alias</th><th>Key</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="keyVaultList"><tr><td colspan="5" style="text-align:center; padding:20px; color:#555;">Loading...</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyBNj71akpefcfEtn-SQfAcx-Pgwi8sUosg", authDomain: "teamdev-88676.firebaseapp.com", databaseURL: "https://teamdev-88676-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "teamdev-88676" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    window.verifyAdmin = async function() {
      const pass = document.getElementById('adminPass').value;
      if(!pass) return;
      try {
        const snap = await get(child(ref(db), 'server/adminAuth'));
        if(snap.exists() && snap.val().password === pass) {
          document.getElementById('adminLoginOverlay').style.display = 'none'; document.getElementById('adminDashboard').style.display = 'flex';
          loadVault(); loadSystemControls(); loadGodMode();
        } else if(!snap.exists()) {
          await set(ref(db, 'server/adminAuth'), { password: pass }); alert("Root password set!"); location.reload();
        } else alert("Access Denied");
      } catch(e) {}
    }

    // GOD MODE LOGIC
    window.loadGodMode = async function() {
      const snap = await get(child(ref(db), 'server/override'));
      if(snap.exists()) {
        const data = snap.val();
        document.getElementById('godModeSize').value = data.size || "AUTO";
        document.getElementById('godModeNum1').value = data.num1 || "";
        document.getElementById('godModeNum2').value = data.num2 || "";
        if(data.size !== "AUTO") document.getElementById('godStatus').innerText = `ACTIVE OVERRIDE: ${data.size}`;
      }
    }
    
    window.setGodMode = async function() {
      const size = document.getElementById('godModeSize').value;
      const n1 = document.getElementById('godModeNum1').value;
      const n2 = document.getElementById('godModeNum2').value;
      
      await set(ref(db, 'server/override'), {
        size: size,
        num1: n1 ? parseInt(n1) : null,
        num2: n2 ? parseInt(n2) : null,
        timestamp: Date.now()
      });
      document.getElementById('godStatus').innerText = size === "AUTO" ? "ALGORITHM MODE ACTIVE" : `INJECTED: FORCE ${size}`;
      if(size !== "AUTO") alert(`God Mode Active: Forcing ${size} to all apps.`);
    }

    // BULK KEY GENERATOR
    window.generateKeys = async function() {
      const prefix = document.getElementById('kgUser').value || 'VIP'; 
      const count = parseInt(document.getElementById('kgCount').value) || 1;
      const hours = parseInt(document.getElementById('kgExpiry').value); 
      const tf = document.getElementById('kgTimeframe').value; 
      
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let generatedKeys = [];
      const updates = {};

      for(let j=0; j<count; j++) {
        let newKey = ''; 
        for (let i = 0; i < 16; i++) { newKey += chars.charAt(Math.floor(Math.random() * chars.length)); if(i===3||i===7||i===11) newKey += '-';}
        const expDate = new Date(); expDate.setHours(expDate.getHours() + hours);
        
        updates['keys/' + newKey] = { user: `${prefix}_${j+1}`, key: newKey, timeframe: tf, status: "ACTIVE", deviceId: null, expiresAt: expDate.toISOString() };
        generatedKeys.push(newKey);
      }
      
      await update(ref(db), updates);
      
      if(count === 1) {
        if(confirm(`Key: ${generatedKeys[0]}\nCopy?`)) navigator.clipboard.writeText(generatedKeys[0]);
      } else {
        const textToCopy = generatedKeys.join('\n');
        navigator.clipboard.writeText(textToCopy);
        alert(`✅ ${count} Keys Generated and copied to clipboard!`);
      }
      loadVault();
    }

    // SYSTEM CONFIG
    let sysState = { maint: false };
    window.toggleMaint = (s) => { sysState.maint=s; document.getElementById('maintOn').className=s?"toggle-btn active":"toggle-btn"; document.getElementById('maintOff').className=!s?"toggle-btn active":"toggle-btn"; }
    window.loadSystemControls = async function() {
      const snap = await get(child(ref(db), 'systemConfig'));
      if(snap.exists()) {
        const config = snap.val();
        if(config.links) { document.getElementById('linkTg').value = config.links.telegramUrl || ""; document.getElementById('linkGame').value = config.links.gameUrl || ""; }
        if(config.maintenance) { toggleMaint(config.maintenance.active); document.getElementById('sessionTime').value = config.maintenance.sessionTime || ""; }
      }
    }
    window.saveSystemControls = async function() {
      await update(ref(db, 'systemConfig'), {
        links: { telegramUrl: document.getElementById('linkTg').value, gameUrl: document.getElementById('linkGame').value },
        maintenance: { active: sysState.maint, sessionTime: document.getElementById('sessionTime').value }
      });
      alert("App Synced!");
    }

    // VAULT MANAGEMENT
    window.inlineAction = async function(action, key) {
      if(action === 'pause') await update(ref(db, `keys/${key}`), { status: 'INACTIVE' });
      if(action === 'resume') await update(ref(db, `keys/${key}`), { status: 'ACTIVE' });
      if(action === 'unbind') await update(ref(db, `keys/${key}`), { deviceId: null });
      if(action === 'delete') if(confirm("Delete key?")) await remove(ref(db, `keys/${key}`));
      loadVault();
    }
    window.loadVault = async function() {
      const snap = await get(child(ref(db), 'keys')); const tbody = document.getElementById('keyVaultList');
      let tot = 0, bnd = 0;
      if(snap.exists()) {
        let html = ''; Object.values(snap.val()).reverse().forEach(k => {
          tot++; if(k.deviceId) bnd++;
          const isExp = new Date() > new Date(k.expiresAt);
          const stat = isExp ? '<span class="badge bg-red">EXP</span>' : (k.status==='ACTIVE'?'<span class="badge bg-green">ON</span>':'<span class="badge bg-red">PAUSED</span>');
          const hwid = k.deviceId ? '<span class="badge bg-green">BOUND</span>' : '<span style="color:#555;">FREE</span>';
          const pBtn = k.status==='ACTIVE'?`<button class="btn-sm" onclick="inlineAction('pause','${k.key}')">||</button>`:`<button class="btn-sm" onclick="inlineAction('resume','${k.key}')">▶</button>`;
          html += `<tr class="v-row"><td>${k.user}</td><td style="color:var(--tc-cyan);">${k.key}</td><td style="font-size:9px;">${new Date(k.expiresAt).toLocaleDateString()}</td><td>${stat} ${hwid}</td><td><div class="action-row">${pBtn}<button class="btn-sm" onclick="inlineAction('unbind','${k.key}')">Unbind</button><button class="btn-sm" style="color:var(--tc-red); border-color:var(--tc-red);" onclick="inlineAction('delete','${k.key}')">X</button></div></td></tr>`;
        });
        tbody.innerHTML = html; document.getElementById('statTotalKeys').innerText=tot; document.getElementById('statActiveBound').innerText=bnd;
      } else tbody.innerHTML = '<tr><td colspan="5">No Keys</td></tr>';
    }
    window.searchVault = function() {
      const q = document.getElementById('searchInput').value.toUpperCase(); const rows = document.getElementsByClassName('v-row');
      for(let r of rows) r.style.display = r.innerText.toUpperCase().includes(q) ? '' : 'none';
    }
  </script>
</body>
</html>
