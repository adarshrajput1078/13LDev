<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEV AMRY - PRO COMMAND CENTER</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-main: #07070a; 
      --bg-panel: #111118; 
      --border-color: rgba(0, 255, 255, 0.15);
      --cyan: #00ffff; 
      --magenta: #ff00ff; 
      --lime: #39ff14; 
      --red: #ff003c; 
      --gold: #ffd700;
      --text-main: #ffffff; 
      --text-muted: #8b8b9e;
      
      /* New Size Variables for Easy Scaling */
      --sidebar-width: 300px;
      --base-padding: 40px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 16px; }

    /* =========================================
       🖥️ SIDEBAR (SCALED UP)
       ========================================= */
    .sidebar { width: var(--sidebar-width); background: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 30px 20px; box-shadow: 5px 0 40px rgba(0,0,0,0.6); z-index: 100;}
    .brand { font-family: 'Share Tech Mono'; font-size: 36px; color: var(--cyan); text-align: center; margin-bottom: 50px; text-shadow: 0 0 15px rgba(0,255,255,0.5); letter-spacing: 3px; font-weight: bold; }
    .brand span { color: var(--magenta); text-shadow: 0 0 15px rgba(255,0,255,0.5); }
    
    .nav-menu { display: flex; flex-direction: column; gap: 15px; flex: 1; }
    .nav-item { padding: 18px 20px; border-radius: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 15px; font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.3s; }
    .nav-item:hover, .nav-item.active { background: rgba(0, 255, 255, 0.1); color: var(--cyan); border-left: 6px solid var(--cyan); }
    .nav-item i { font-size: 22px; width: 25px; text-align: center; }
    
    .kill-switch { margin-top: auto; background: rgba(255, 0, 60, 0.1); border: 1px solid var(--red); color: var(--red); padding: 20px; border-radius: 10px; font-size: 18px; text-align: center; cursor: pointer; font-weight: 900; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
    .kill-switch:hover { background: var(--red); color: #fff; box-shadow: 0 0 30px rgba(255, 0, 60, 0.6); }

    /* =========================================
       🎛️ MAIN CONTENT AREA
       ========================================= */
    .main-content { flex: 1; display: flex; flex-direction: column; padding: var(--base-padding); overflow-y: auto; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .header-bar h2 { font-weight: 900; font-size: 32px; letter-spacing: 1px; }
    .search-box { display: flex; align-items: center; background: var(--bg-panel); border: 2px solid var(--border-color); border-radius: 10px; padding: 15px 20px; width: 400px; transition: 0.3s; }
    .search-box:focus-within { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,255,255,0.2); }
    .search-box i { font-size: 18px; color: var(--text-muted); margin-right: 15px; }
    .search-box input { background: transparent; border: none; color: #fff; outline: none; width: 100%; font-family: 'Share Tech Mono'; font-size: 18px; }

    /* =========================================
       📊 STATS GRID (MASSIVE)
       ========================================= */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; margin-bottom: 40px; }
    .stat-card { background: var(--bg-panel); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); border-left: 6px solid var(--cyan); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .stat-card.lime { border-left-color: var(--lime); } .stat-card.gold { border-left-color: var(--gold); } .stat-card.red { border-left-color: var(--red); }
    .stat-title { font-size: 16px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
    .stat-value { font-family: 'Share Tech Mono'; font-size: 48px; font-weight: bold; text-shadow: 0 0 20px rgba(255,255,255,0.1); }

    /* =========================================
       ⚙️ CONTROLS PANEL
       ========================================= */
    .control-panel { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-bottom: 40px; }
    .control-box { background: var(--bg-panel); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); }
    .control-box h3 { font-size: 20px; margin-bottom: 20px; color: var(--cyan); display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
    
    .input-group { display: flex; gap: 15px; }
    .input-group input { flex: 1; padding: 18px; background: rgba(0,0,0,0.5); border: 2px solid #333; color: #fff; border-radius: 10px; font-family: 'Share Tech Mono'; font-size: 18px; outline: none; transition: 0.3s; }
    .input-group input:focus { border-color: var(--cyan); }
    .btn-primary { padding: 18px 30px; background: var(--cyan); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
    .btn-primary:hover { box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); transform: translateY(-2px); }
    
    .btn-toggle { width: 100%; padding: 22px; background: rgba(255,255,255,0.05); color: #fff; border: 2px solid #444; border-radius: 10px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
    .btn-toggle.active { background: rgba(255, 0, 60, 0.1); border-color: var(--red); color: var(--red); box-shadow: 0 0 25px rgba(255, 0, 60, 0.4); }

    /* =========================================
       📋 USER TABLE (SPACIOUS)
       ========================================= */
    .table-container { background: var(--bg-panel); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); flex: 1; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .table-header { padding: 25px 30px; border-bottom: 2px solid rgba(255,255,255,0.05); font-weight: 900; font-size: 22px; color: #fff; display: flex; align-items: center; gap: 10px; }
    
    .table-wrapper { overflow: auto; flex: 1; }
    table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1100px; }
    th { background: rgba(0,0,0,0.6); color: var(--text-muted); font-size: 15px; text-transform: uppercase; padding: 20px 30px; position: sticky; top: 0; z-index: 10; font-weight: 800; letter-spacing: 1px; }
    td { padding: 25px 30px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 16px; vertical-align: middle; }
    tr:hover { background: rgba(255,255,255,0.03); }
    
    .badge { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 900; text-transform: uppercase; font-family: 'Share Tech Mono'; display: inline-flex; align-items: center; gap: 6px; }
    .badge.pending { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid rgba(255, 215, 0, 0.3); }
    .badge.active { background: rgba(57, 255, 20, 0.1); color: var(--lime); border: 1px solid rgba(57, 255, 20, 0.3); }
    .badge.blocked { background: rgba(255, 0, 60, 0.1); color: var(--red); border: 1px solid rgba(255, 0, 60, 0.3); }
    
    .urgent-pulse { background: var(--red); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 900; margin-left: 10px; animation: blink 1s infinite; display: inline-block; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; box-shadow: 0 0 15px var(--red); } }

    /* Big Action Buttons */
    .action-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-sm { padding: 10px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 900; cursor: pointer; font-family: 'Share Tech Mono'; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
    .btn-approve { background: rgba(57, 255, 20, 0.15); color: var(--lime); border: 1px solid var(--lime); }
    .btn-approve:hover { background: var(--lime); color: #000; box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
    
    .btn-danger { background: rgba(255, 0, 60, 0.15); color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; box-shadow: 0 0 15px rgba(255, 0, 60, 0.4); }
    
    .btn-warning { background: rgba(255, 215, 0, 0.15); color: var(--gold); border: 1px solid var(--gold); }
    .btn-warning:hover { background: var(--gold); color: #000; }
    
    .btn-del { background: transparent; color: var(--text-muted); border: 1px solid #555; }
    .btn-del:hover { background: #555; color: #fff; }

    /* Custom Scrollbar for massive feel */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

    /* =========================================
       📱 MOBILE RESPONSIVE (Auto Scales Down)
       ========================================= */
    @media (max-width: 1024px) {
        :root { --sidebar-width: 260px; --base-padding: 20px; }
        .stats-grid { grid-template-columns: 1fr 1fr; }
        .control-panel { grid-template-columns: 1fr; }
        .brand { font-size: 28px; }
        .stat-value { font-size: 36px; }
    }
    @media (max-width: 768px) {
        body { flex-direction: column; overflow-y: auto; }
        .sidebar { width: 100%; border-right: none; border-bottom: 2px solid var(--border-color); padding: 20px; flex-direction: row; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        .brand { margin-bottom: 0; font-size: 24px; text-align: left; }
        .nav-menu { display: none; }
        .kill-switch { margin-top: 0; padding: 10px 15px; font-size: 14px; }
        .main-content { overflow-y: visible; }
        .header-bar { flex-direction: column; align-items: stretch; gap: 20px; }
        .search-box { width: 100%; }
        .stats-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">DEV <span>AMRY</span></div>
    <div class="nav-menu">
      <div class="nav-item active"><i class="fa-solid fa-server"></i> Control Center</div>
      <div class="nav-item"><i class="fa-solid fa-users"></i> Users</div>
      <div class="nav-item"><i class="fa-solid fa-shield-halved"></i> Security</div>
    </div>
    <button class="kill-switch" id="globalKillBtn"><i class="fa-solid fa-skull"></i> GLOBAL KILL</button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <header class="header-bar">
      <h2>Dashboard Overview</h2>
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search by UID...">
      </div>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">Total Requests</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card lime">
        <div class="stat-title">Active Users</div>
        <div class="stat-value" style="color: var(--lime);" id="statActive">0</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-title">Pending</div>
        <div class="stat-value" style="color: var(--gold);" id="statPending">0</div>
      </div>
      <div class="stat-card red">
        <div class="stat-title">Urgent</div>
        <div class="stat-value" style="color: var(--red);" id="statUrgent">0</div>
      </div>
    </section>

    <section class="control-panel">
      <div class="control-box">
        <h3 style="color:var(--cyan);"><i class="fa-solid fa-link"></i> Live Game Link Injection</h3>
        <div class="input-group">
          <input type="text" id="gameUrlInput" placeholder="Paste target game URL here...">
          <button class="btn-primary" id="updateLinkBtn">INJECT</button>
        </div>
      </div>
      <div class="control-box">
        <h3 style="color:var(--cyan);"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Market Logic</h3>
        <button id="reverseToggleBtn" class="btn-toggle">REVERSE MODE: OFF</button>
      </div>
    </section>

    <section class="table-container">
      <div class="table-header"><i class="fa-solid fa-users-gear"></i> Live User Management</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Game UID</th>
              <th>Status</th>
              <th>Time Remaining</th>
              <th>Approve Timer</th>
              <th>Security Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Dynamic Content -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyBNj71akpefcfEtn-SQfAcx-Pgwi8sUosg", authDomain: "teamdev-88676.firebaseapp.com", databaseURL: "https://teamdev-88676-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "teamdev-88676" };
    const app = initializeApp(firebaseConfig); const database = getDatabase(app);

    document.getElementById('updateLinkBtn').addEventListener('click', async () => {
        const url = document.getElementById('gameUrlInput').value.trim();
        if(url) {
            await set(ref(database, 'systemConfig/links/gameUrl'), url);
            const btn = document.getElementById('updateLinkBtn');
            btn.innerText = "INJECTED!"; btn.style.background = "var(--lime)";
            setTimeout(() => { btn.innerText = "INJECT"; btn.style.background = "var(--cyan)"; }, 2000);
        }
    });

    let isReverse = false; const reverseBtn = document.getElementById('reverseToggleBtn');
    onValue(ref(database, 'systemConfig/settings/reverseMode'), (snap) => {
        isReverse = snap.val() || false;
        reverseBtn.innerText = isReverse ? "REVERSE MODE: ACTIVE" : "REVERSE MODE: OFF";
        isReverse ? reverseBtn.classList.add('active') : reverseBtn.classList.remove('active');
    });
    reverseBtn.addEventListener('click', async () => await set(ref(database, 'systemConfig/settings/reverseMode'), !isReverse));

    document.getElementById('globalKillBtn').addEventListener('click', async () => {
        if(confirm("🚨 WARNING: This will BLOCK ALL USERS. Proceed?")) {
            const snap = await get(ref(database, 'users'));
            if(snap.exists()) {
                const updates = {};
                Object.keys(snap.val()).forEach(uid => {
                    updates[`${uid}/status`] = "BLOCKED"; updates[`${uid}/expiresAt`] = null; updates[`${uid}/isUrgent`] = false; updates[`${uid}/blockReason`] = "SYSTEM PURGE";
                });
                await update(ref(database, 'users'), updates);
                alert("ALL USERS BLOCKED.");
            }
        }
    });

    document.getElementById('searchInput').addEventListener('keyup', function() {
        const filter = this.value.toUpperCase(), trs = document.getElementById('userTableBody').getElementsByTagName('tr');
        for (let i = 0; i < trs.length; i++) {
            let td = trs[i].getElementsByTagName("td")[0];
            if (td) trs[i].style.display = (td.textContent || td.innerText).toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
    });

    const tableBody = document.getElementById('userTableBody');
    function getTimeLeft(expiresAt) {
        if(!expiresAt) return `--`;
        const diff = new Date(expiresAt) - new Date();
        if(diff <= 0) return `<span style='color:var(--red); font-weight:900;'>CRASHED</span>`;
        return `<span style='color:var(--lime); font-family:"Share Tech Mono"; font-weight:bold; font-size:18px;'>${Math.floor(diff / 60000)} MIN</span>`;
    }

    onValue(ref(database, 'users'), (snapshot) => {
        tableBody.innerHTML = ''; let tTot=0, tAct=0, tPen=0, tUrg=0;
        if (snapshot.exists()) {
            const users = snapshot.val();
            Object.keys(users).sort((a,b)=>{ 
                if(users[a].isUrgent && !users[b].isUrgent) return -1;
                if(users[a].status === "PENDING" && users[b].status !== "PENDING") return -1; 
                return 1; 
            }).forEach(uid => {
                const data = users[uid]; tTot++;
                if(data.status==="ACTIVE") tAct++; if(data.status==="PENDING") tPen++; if(data.isUrgent) tUrg++;
                
                const reasonTxt = (data.status==="BLOCKED" && data.blockReason) ? `<div style="color:var(--red); font-size:12px; margin-top:8px; font-weight:bold;">[${data.blockReason}]</div>` : "";
                const deviceStatus = data.deviceId ? `<div style="color:var(--text-muted); font-size:12px; margin-top:8px;"><i class="fa-solid fa-mobile-screen"></i> Device Bound</div>` : `<div style="color:var(--gold); font-size:12px; margin-top:8px;">No Device</div>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family:'Share Tech Mono'; font-weight:900; font-size:22px; color: #fff;">
                        <i class="fa-solid fa-user-astronaut" style="color:var(--cyan); margin-right:12px;"></i>${uid} 
                        ${data.isUrgent ? `<span class="urgent-pulse">URGENT</span>` : ""}
                        ${deviceStatus}
                    </td>
                    <td><span class="badge ${data.status.toLowerCase()}">${data.status}</span> ${reasonTxt}</td>
                    <td>${getTimeLeft(data.expiresAt)}</td>
                    <td><div class="action-group">
                        <button class="btn-sm btn-approve" onclick="window.manageUser('${uid}', 15)">15M</button>
                        <button class="btn-sm btn-approve" onclick="window.manageUser('${uid}', 30)">30M</button>
                        <button class="btn-sm btn-approve" onclick="window.manageUser('${uid}', 60)">1H</button>
                        <button class="btn-sm btn-approve" onclick="window.manageUser('${uid}', 1440)">24H</button>
                    </div></td>
                    <td><div class="action-group">
                        <button class="btn-sm btn-danger" onclick="window.blockUser('${uid}')"><i class="fa-solid fa-ban"></i> BLOCK</button>
                        <button class="btn-sm btn-warning" onclick="window.resetDevice('${uid}')" title="Reset Device Bind"><i class="fa-solid fa-unlock"></i> RESET</button>
                        <button class="btn-sm btn-del" onclick="window.deleteUser('${uid}')"><i class="fa-regular fa-trash-can"></i></button>
                    </div></td>
                `;
                tableBody.appendChild(tr);
            });
        }
        document.getElementById('statTotal').innerText = tTot; document.getElementById('statActive').innerText = tAct;
        document.getElementById('statPending').innerText = tPen; document.getElementById('statUrgent').innerText = tUrg;
    });

    window.manageUser = async (uid, minutes) => {
        const exp = new Date(); exp.setMinutes(exp.getMinutes() + minutes);
        await update(ref(database, `users/${uid}`), { status: "ACTIVE", expiresAt: exp.toISOString(), isUrgent: false, blockReason: null });
    };

    window.blockUser = async (uid) => {
        const reason = prompt("Enter reason for blocking (e.g., Payment Due, Cheating):", "VIOLATION OF RULES");
        if(reason !== null) {
            await update(ref(database, `users/${uid}`), { 
                status: "BLOCKED", expiresAt: null, isUrgent: false, 
                blockReason: reason.toUpperCase() 
            });
        }
    };

    window.resetDevice = async (uid) => {
        if(confirm(`Reset device binding for UID: ${uid}? User will be able to login from a new phone.`)) {
            await update(ref(database, `users/${uid}`), { deviceId: null });
        }
    };

    window.deleteUser = async (uid) => {
        if(confirm(`Completely erase UID: ${uid}?`)) await remove(ref(database, `users/${uid}`));
    };

    setInterval(() => { const refreshEvent = new Event('change'); document.dispatchEvent(refreshEvent); }, 60000);
  </script>
</body>
</html>
