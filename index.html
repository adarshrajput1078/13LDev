<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#12121c">
    <title>DEV ARMY | WINGO PRO COMPACT</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=JetBrains+Mono:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- COLOR TRADING SPECIFIC VARIABLES --- */
        :root { 
            --trade-green: #1DCC70;
            --trade-green-glow: rgba(29, 204, 112, 0.6);
            --trade-red: #FF2D55;
            --trade-red-glow: rgba(255, 45, 85, 0.6);
            --trade-violet: #8E24AA;
            
            --bg-dark: #0a0a0f;
            --widget-bg: rgba(18, 18, 28, 0.85); 
            
            --font-ui: 'Poppins', sans-serif; 
            --font-data: 'JetBrains Mono', monospace;
            --z-widget: 99999;
        }

        /* --- GLOBAL RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background-color: var(--bg-dark); overflow: hidden; font-family: var(--font-ui); touch-action: none; }

        /* --- BACKGROUND IFRAME --- */
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; filter: saturate(1.15); }

        /* ======================================================================= */
        /* THE "SHOW WIDGET" EYE BUTTON (RESIZED)                                  */
        /* ======================================================================= */
        #show-widget-btn {
            position: absolute; top: 50%; right: -120px; 
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--trade-violet), #4a00e0);
            color: #fff; padding: 12px 10px;
            border-radius: 12px 0 0 12px;
            font-weight: 900; font-size: 11px; font-family: var(--font-ui);
            cursor: pointer; box-shadow: -5px 0 15px rgba(142, 36, 170, 0.5);
            z-index: 999999; transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.2); border-right: none;
            display: flex; align-items: center; gap: 5px;
        }
        .pulse-icon { animation: pulse-icon 1s infinite alternate; font-size: 14px; }
        @keyframes pulse-icon { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }

        /* ======================================================================= */
        /* MAIN DRAGGABLE WIDGET (COMPACT SIZE: 200px)                             */
        /* ======================================================================= */
        #ai-widget { 
            position: absolute; top: 60px; left: 15px; 
            width: 200px; /* RE-SIZED FROM 235px */
            background: var(--widget-bg); 
            backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.2), 0 0 15px rgba(142, 36, 170, 0.2);
            display: flex; flex-direction: column; z-index: var(--z-widget);
            transform: scale(1); transform-origin: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s, box-shadow 0.5s ease, border-color 0.5s ease;
            will-change: left, top, transform;
        }

        .float-active { animation: float-hud 5s ease-in-out infinite; }
        @keyframes float-hud { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* --- HEADER (RESIZED) --- */
        .widget-header { 
            padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; 
            cursor: grab; border-radius: 20px 20px 0 0; position: relative; z-index: 3; touch-action: none;
        }
        .widget-header:active { cursor: grabbing; }
        .drag-pill { width: 35px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 8px; }
        .brand-title { font-size: 12px; font-weight: 900; color: #fff; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
        .brand-title .vip { background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- LIVE PERIOD & TIMER (RESIZED) --- */
        .live-game-data {
            display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(0,0,0,0.4); 
            border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 3;
        }
        .game-period, .game-timer { display: flex; flex-direction: column; gap: 2px; }
        .game-timer { align-items: flex-end; }
        .lbl { font-size: 8px; color: #94a3b8; font-weight: 800; letter-spacing: 1px; }
        .game-period .val { font-family: var(--font-data); font-size: 10px; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
        .game-timer .val { font-family: var(--font-data); font-size: 15px; font-weight: 900; color: var(--trade-green); text-shadow: 0 0 10px var(--trade-green-glow); transition: color 0.3s, text-shadow 0.3s; }
        .timer-danger { color: var(--trade-red) !important; text-shadow: 0 0 12px var(--trade-red-glow) !important; animation: pulse-danger 1s infinite alternate; }

        /* --- CONTENT AREA (RESIZED) --- */
        .content-area { padding: 12px; display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 3; }
        
        .ai-stats { display: flex; justify-content: space-between; font-size: 8px; font-family: var(--font-data); color: #a9a9a9; font-weight: 800; margin-bottom: -5px; }
        .ai-stats span.high { color: var(--trade-violet); text-shadow: 0 0 5px var(--trade-violet); }
        
        /* 🔥 FIREBASE LIVE STATUS 🔥 */
        #db-status { color: #ff003c; text-shadow: 0 0 5px #ff003c; transition: all 0.3s; }
        #db-status.connected { color: var(--trade-green); text-shadow: 0 0 5px var(--trade-green); }
        
        .tech-grid {
            position: absolute; top: 20%; left: 10%; width: 80%; height: 60%;
            background-image: linear-gradient(rgba(142, 36, 170, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(142, 36, 170, 0.1) 1px, transparent 1px);
            background-size: 15px 15px; z-index: 1; pointer-events: none; border-radius: 50%; opacity: 0.5;
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%); -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
            animation: radar-spin 10s linear infinite;
        }
        @keyframes radar-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .sys-log {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px;
            padding: 6px 8px; font-family: var(--font-data); font-size: 7px; color: var(--trade-green);
            text-align: left; height: 22px; overflow: hidden; white-space: nowrap; position: relative; z-index: 3;
        }

        /* --- AUTHENTICATION UI (RESIZED) --- */
        .auth-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-family: var(--font-data); font-weight: 800; font-size: 11px; outline: none; transition: 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .auth-input:focus { border-color: var(--trade-violet); box-shadow: 0 0 15px rgba(142, 36, 170, 0.4); }
        .btn-main { width: 100%; padding: 10px; font-size: 11px; font-family: var(--font-ui); font-weight: 900; cursor: pointer; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--trade-violet), #4a00e0); color: #fff; letter-spacing: 1px; text-transform: uppercase; transition: 0.2s ease; box-shadow: 0 5px 15px rgba(142, 36, 170, 0.4); }
        .btn-main:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(142, 36, 170, 0.4); }

        /* ======================================================================= */
        /* 5. CINEMATIC ENGINE (COMPACT SPLIT REVEAL)                              */
        /* ======================================================================= */
        .hud-row { display: flex; justify-content: space-around; align-items: center; width: 100%; position: relative; height: 70px; z-index: 3; }
        .input-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 2; }
        
        .hud-input { 
            width: 45px; height: 45px; border-radius: 12px; background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.15);
            color: #fff; font-family: var(--font-data); font-size: 18px; font-weight: 900; text-align: center; outline: none; transition: 0.3s;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .hud-input:focus { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .input-label { font-size: 8px; color: #94a3b8; font-weight: 800; font-family: var(--font-data); letter-spacing: 1px;}

        .result-wrapper {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0);
            width: 0px; height: 0px; opacity: 0; display: flex; justify-content: center; align-items: center;
            border-radius: 50%; z-index: 5; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-family: var(--font-ui); font-weight: 900; color: #fff; font-size: 0px; overflow: hidden;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .hud-row.reveal .input-wrapper:nth-child(1) { transform: translateX(-55px) scale(0.35); opacity: 0.1; filter: blur(3px); }
        .hud-row.reveal .input-wrapper:nth-child(2) { transform: translateX(55px) scale(0.35); opacity: 0.1; filter: blur(3px); }
        
        /* Decoding Mode */
        .hud-row.reveal .result-wrapper.decoding {
            width: 70px; height: 70px; opacity: 1; transform: translate(-50%, -50%) scale(1);
            font-size: 14px; font-family: var(--font-data); border: 2px dashed rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.9); color: var(--cyber-blue); animation: spin-dash 3s linear infinite;
        }
        
        /* Locked Mode */
        .hud-row.reveal .result-wrapper.locked {
            width: 75px; height: 75px; opacity: 1; transform: translate(-50%, -50%) scale(1);
            font-size: 14px; border: 2px solid #fff; letter-spacing: 1px; animation: shockwave 0.5s ease-out forwards;
        }

        @keyframes shockwave {
            0% { transform: translate(-50%, -50%) scale(0.8); box-shadow: 0 0 0 0 rgba(255,255,255,0.8); }
            70% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 0 15px rgba(255,255,255,0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
        @keyframes spin-dash { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .text-anti-spin { animation: anti-spin-dash 3s linear infinite; }
        @keyframes anti-spin-dash { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }

        .res-big { background: linear-gradient(135deg, var(--trade-green), #007a33); box-shadow: 0 0 30px var(--trade-green-glow), inset 0 0 15px rgba(255,255,255,0.6) !important; }
        .res-small { background: linear-gradient(135deg, var(--trade-red), #99001b); box-shadow: 0 0 30px var(--trade-red-glow), inset 0 0 15px rgba(255,255,255,0.6) !important; }

        /* --- ACTION BUTTONS (RESIZED) --- */
        .btn-row { display: flex; gap: 8px; width: 100%; margin-top: 5px; z-index: 3; position: relative;}
        .action-btn { flex: 1; padding: 10px 0; border-radius: 10px; border: none; font-size: 10px; font-weight: 900; font-family: var(--font-ui); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; color: #fff; }
        #btn-get { background: linear-gradient(135deg, var(--trade-violet), #4a00e0); box-shadow: 0 5px 15px rgba(142, 36, 170, 0.4); }
        #btn-get:active { transform: scale(0.94); }
        #btn-hide { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
        #btn-hide:active { transform: scale(0.94); }

        /* Toast Notifications */
        #toast-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 999999; display: flex; flex-direction: column; gap: 10px; width: 80%; max-width: 300px; }
        .client-toast { background: rgba(18, 18, 28, 0.95); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 15px; border-radius: 10px; font-family: var(--font-ui); font-size: 11px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.6); animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; display: flex; align-items: center; justify-content: center; gap: 8px; text-align: center; }

        .hidden { display: none !important; }
        
        /* --- SPLASH & MAINTENANCE SCREENS --- */
        #splash-screen, #maintenance-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out; }
        #splash-screen { z-index: var(--z-splash); }
        #maintenance-screen { z-index: var(--z-maint); display: none; background: rgba(5,0,0,0.95); backdrop-filter: blur(15px); }
        .splash-logo { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .splash-logo span.g { color: var(--trade-green); text-shadow: 0 0 20px var(--trade-green-glow); }
        .splash-logo span.r { color: var(--trade-red); text-shadow: 0 0 20px var(--trade-red-glow); }
        .splash-bar { width: 180px; height: 5px; background: rgba(255,255,255,0.1); margin-top: 20px; border-radius: 10px; overflow: hidden; position: relative; }
        .splash-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: linear-gradient(90deg, var(--trade-green), var(--trade-violet), var(--trade-red)); box-shadow: 0 0 15px rgba(255, 255, 255, 0.5); animation: load-progress 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .splash-text { margin-top: 15px; font-family: var(--font-data); font-size: 10px; color: #a9a9a9; letter-spacing: 1px; font-weight: 600; }
        .maint-icon { font-size: 45px; margin-bottom: 15px; animation: float-hud 3s infinite ease-in-out; }
        .maint-title { font-size: 20px; color: #fff; font-weight: 900; letter-spacing: 2px; }
        .maint-sub { font-family: var(--font-data); color: #94a3b8; font-size: 11px; margin-top: 10px; text-align: center; padding: 0 20px;}

        @keyframes pulse-danger { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes load-progress { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body>

    <!-- MAINTENANCE & SPLASH SCREENS -->
    <div id="maintenance-screen">
        <div class="maint-icon">⚠️</div>
        <div class="maint-title">SYSTEM UPDATE</div>
        <div class="maint-sub">Trading engine is currently undergoing maintenance. Please check back shortly.</div>
    </div>

    <div id="splash-screen">
        <div class="splash-logo"><span class="g">WIN</span><span class="r">GO</span> PRO</div>
        <div class="splash-bar"><div class="splash-progress"></div></div>
        <div class="splash-text" id="splash-log">CONNECTING TO TRADING SERVER...</div>
    </div>

    <!-- GAME IFRAME (FIXED) -->
    <div id="game-container">
        <iframe id="gameIframe" src="" frameborder="0" style="width: 100%; height: 100%; border: none; filter: saturate(1.15);"></iframe>
    </div>

    <!-- HIDE/SHOW BUTTON (EYE) -->
    <div id="show-widget-btn" onclick="openWidget()">
        <span class="pulse-icon">👁️</span> VIP
    </div>

    <!-- MAIN WIDGET (COMPACT) -->
    <div id="ai-widget" class="float-active">
        
        <!-- HEADER -->
        <div class="widget-header" id="widget-header">
            <div class="drag-pill"></div>
            <div class="brand-title">DEV ARMY <span class="vip">VIP</span></div>
        </div>

        <!-- LIVE DATA STRIP -->
        <div class="live-game-data">
            <div class="game-period">
                <span class="lbl">LIVE PERIOD</span>
                <span class="val" id="live-period">SYNCING...</span>
            </div>
            <div class="game-timer">
                <span class="lbl">COUNTDOWN</span>
                <span class="val" id="live-timer">00:00</span>
            </div>
        </div>

        <!-- MAIN INTERFACE -->
        <div class="content-area" id="content-area">
            
            <!-- AUTHENTICATION VIEW -->
            <div id="auth-section">
                <input type="text" id="uidInput" class="auth-input" placeholder="ENTER VIP KEY" autocomplete="off">
                <button id="authBtn" class="btn-main" onclick="authenticateClient()">AUTHORIZE ACCESS</button>
            </div>

            <!-- PREDICTION ENGINE VIEW -->
            <div id="pred-section" class="hidden" style="width: 100%; display: flex; flex-direction: column; gap: 10px;">
                
                <div class="ai-stats">
                    <span>ACCURACY: <span class="high">98.4%</span></span>
                    <!-- LIVE FIREBASE DB INDICATOR -->
                    <span>DB: <span id="db-status">CONNECTING...</span></span>
                </div>
                <div class="tech-grid"></div> 

                <div class="hud-row" id="engine-row">
                    <div class="input-wrapper">
                        <input type="number" id="prevInput" class="hud-input" placeholder="-" oninput="limitDigit(this)">
                        <div class="input-label">PREV</div>
                    </div>
                    
                    <div class="input-wrapper">
                        <input type="number" id="currInput" class="hud-input" placeholder="-" oninput="limitDigit(this)">
                        <div class="input-label">CURR</div>
                    </div>

                    <div class="result-wrapper" id="result-box">
                        <div class="text-anti-spin" id="result-text">?</div>
                    </div>
                </div>

                <div class="sys-log" id="sys-log">> AI Engine Standby...</div>

                <div class="btn-row">
                    <button class="action-btn" id="btn-get" onclick="executeCinematicHack()">ANALYZE</button>
                    <button class="action-btn" id="btn-hide" onclick="closeWidget()">HIDE</button>
                </div>
                
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container"></div>

    <script type="module">
        // =======================================================================
        // FIREBASE SETUP
        // =======================================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyBNj71akpefcfEtn-SQfAcx-Pgwi8sUosg", 
            databaseURL: "https://teamdev-88676-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activePeriod = "";
        let scrambleInt = null;

        // =======================================================================
        // FIREBASE LIVE CONNECTION MONITOR
        // =======================================================================
        const dbStatusEl = document.getElementById('db-status');
        onValue(ref(db, '.info/connected'), (snap) => {
            if (snap.val() === true) {
                dbStatusEl.innerText = "CONNECTED 🟢";
                dbStatusEl.style.color = "var(--trade-green)";
                dbStatusEl.style.textShadow = "0 0 5px var(--trade-green)";
            } else {
                dbStatusEl.innerText = "OFFLINE 🔴";
                dbStatusEl.style.color = "var(--trade-red)";
                dbStatusEl.style.textShadow = "0 0 5px var(--trade-red)";
            }
        });

        // --- MAINTENANCE & GAME LINK SYNC ---
        onValue(ref(db, 'settings/maintenance'), (snapshot) => {
            const isMaint = snapshot.val();
            document.getElementById('maintenance-screen').style.display = isMaint ? "flex" : "none";
            document.getElementById('ai-widget').style.display = isMaint ? "none" : "flex";
        });
        onValue(ref(db, 'settings/force_link'), (snapshot) => { 
            if(snapshot.exists()) document.getElementById('gameIframe').src = snapshot.val(); 
        });

        // =======================================================================
        // HIDE & SHOW WIDGET LOGIC
        // =======================================================================
        window.closeWidget = () => {
            const widget = document.getElementById('ai-widget');
            const showBtn = document.getElementById('show-widget-btn');
            widget.style.transform = "scale(0)";
            setTimeout(() => {
                widget.style.display = "none";
                showBtn.style.right = "0"; 
            }, 350);
        };

        window.openWidget = () => {
            const widget = document.getElementById('ai-widget');
            const showBtn = document.getElementById('show-widget-btn');
            showBtn.style.right = "-120px"; 
            widget.style.display = "flex";
            setTimeout(() => {
                widget.style.transform = "scale(1)";
            }, 50);
        };

        // =======================================================================
        // LIVE GAME TIMER & PERFECT PERIOD LOCK FIX
        // =======================================================================
        function startLiveGameSync() {
            setInterval(() => {
                let now = new Date();
                let y = now.getFullYear(); let m = String(now.getMonth() + 1).padStart(2, '0'); let d = String(now.getDate()).padStart(2, '0');
                let totalMinutes = now.getHours() * 60 + now.getMinutes() + 1;
                let periodStr = `${y}${m}${d}1000${String(totalMinutes).padStart(4, '0')}`;
                
                document.getElementById('live-period').innerText = periodStr;

                // ABSOLUTE FIX: Reset ONLY when the Period Number literally changes
                if (activePeriod !== "" && activePeriod !== periodStr) {
                    resetResultUI();
                }
                activePeriod = periodStr;

                let sec = now.getSeconds(); let rem = 60 - sec; if(rem === 60) rem = 0;
                let timerEl = document.getElementById('live-timer');
                timerEl.innerText = `00:${String(rem).padStart(2, '0')}`;
                if(rem <= 10) timerEl.classList.add('timer-danger'); else timerEl.classList.remove('timer-danger');
            }, 1000);
        }

        // =======================================================================
        // BOOT SEQUENCE & DRAGGING
        // =======================================================================
        window.onload = () => { 
            startLiveGameSync();
            let i = 0;
            const logs = ["ESTABLISHING PROTOCOL...", "SYNCING WITH GAME SERVER...", "LOADING TRADING ALGORITHM...", "SYSTEM READY."];
            let interval = setInterval(() => { if(i < logs.length) { document.getElementById('splash-log').innerText = logs[i]; i++; } else { clearInterval(interval); } }, 600);
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = "0";
                setTimeout(() => { 
                    document.getElementById('splash-screen').style.display = "none"; 
                    document.getElementById('ai-widget').style.opacity = "1";
                }, 800);
            }, 2600);
        };

        const widgetEl = document.getElementById("ai-widget"), handleEl = document.getElementById("widget-header");
        let isDragging = false, startX, startY, initialX, initialY;
        handleEl.addEventListener("pointerdown", (e) => {
            isDragging = true; widgetEl.classList.remove("float-active");
            startX = e.clientX; startY = e.clientY; initialX = widgetEl.offsetLeft; initialY = widgetEl.offsetTop;
            handleEl.setPointerCapture(e.pointerId); 
        });
        handleEl.addEventListener("pointermove", (e) => {
            if (!isDragging) return; e.preventDefault();
            let newX = Math.max(0, Math.min(initialX + (e.clientX - startX), window.innerWidth - widgetEl.offsetWidth));
            let newY = Math.max(0, Math.min(initialY + (e.clientY - startY), window.innerHeight - widgetEl.offsetHeight));
            widgetEl.style.left = newX + "px"; widgetEl.style.top = newY + "px";
        });
        handleEl.addEventListener("pointerup", (e) => { isDragging = false; widgetEl.classList.add("float-active"); handleEl.releasePointerCapture(e.pointerId); });

        // =======================================================================
        // UTILS & FIREBASE AUTHENTICATION (FIXED)
        // =======================================================================
        window.showClientToast = (msg, isErr = false) => {
            const container = document.getElementById("toast-container"), toast = document.createElement("div");
            toast.className = "client-toast"; toast.style.borderColor = isErr ? "var(--trade-red)" : "var(--trade-green)";
            toast.innerHTML = `<span>${isErr ? '⚠️' : '✅'}</span> ${msg}`;
            container.appendChild(toast); setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => toast.remove(), 300); }, 3000);
        };
        window.limitDigit = (el) => { if(el.value.length > 1) el.value = el.value.slice(0, 1); if(parseInt(el.value) < 0 || parseInt(el.value) > 9) el.value = ""; };
        
        window.authenticateClient = async () => {
            const uid = document.getElementById('uidInput').value.trim(); 
            if (!uid) return showClientToast("Enter VIP Key!", true);
            
            const btn = document.getElementById('authBtn'); 
            btn.innerText = "VERIFYING..."; btn.disabled = true;

            let did = localStorage.getItem('dev_army_secure_did'); 
            if (!did) { 
                did = 'DEV-' + Math.random().toString(36).substr(2, 10).toUpperCase(); 
                localStorage.setItem('dev_army_secure_did', did); 
            }

            if (uid === "112233") {
                showClientToast("Master VIP Access Granted");
                document.getElementById('auth-section').classList.add('hidden'); 
                document.getElementById('pred-section').classList.remove('hidden');
                return;
            }

            try {
                const snap = await get(ref(db, 'approved_uids/' + uid));
                
                if (snap.exists()) {
                    let user = snap.val();
                    if (user.is_banned === true) return handleAuthFail("ACCOUNT BANNED BY ADMIN", btn);
                    if (user.expire_at && user.expire_at < Date.now()) return handleAuthFail("SUBSCRIPTION EXPIRED", btn);
                    
                    if (!user.device_id) { 
                        await update(ref(db, 'approved_uids/' + uid), { device_id: did }); 
                    } else if (user.device_id !== did) { 
                        return handleAuthFail("DEVICE MISMATCH (BOUND TO ANOTHER PHONE)", btn);
                    }
                    
                    showClientToast("Verification Successful ✅");
                    document.getElementById('auth-section').classList.add('hidden'); 
                    document.getElementById('pred-section').classList.remove('hidden');
                    
                } else {
                    btn.innerText = "WAITING FOR ADMIN APPROVAL...";
                    await set(ref(db, 'pending_uids/' + uid), { deviceId: did, timestamp: Date.now() });
                    
                    onValue(ref(db, 'approved_uids/' + uid), (newSnap) => { 
                        if (newSnap.exists() && !newSnap.val().is_banned) { 
                            showClientToast("Access Approved by Admin ✅");
                            document.getElementById('auth-section').classList.add('hidden'); 
                            document.getElementById('pred-section').classList.remove('hidden');
                        } 
                    });
                }
            } catch (err) { 
                console.error(err);
                handleAuthFail("DATABASE CONNECTION ERROR", btn); 
            }
        };

        function handleAuthFail(msg, btn) { 
            showClientToast(msg, true); 
            btn.innerText = "AUTHORIZE ACCESS"; 
            btn.disabled = false; 
        }

        // =======================================================================
        // PREDICTION HACK EXECUTION WITH FAIL-SAFES
        // =======================================================================
        window.executeCinematicHack = async () => {
            const n2 = document.getElementById('prevInput');
            const n1 = document.getElementById('currInput');
            const row = document.getElementById('engine-row');
            const resBox = document.getElementById('result-box');
            const resText = document.getElementById('result-text');
            const btn = document.getElementById('btn-get');
            const sysLog = document.getElementById('sys-log');
            
            if(n1.value === "" || n2.value === "") return showClientToast("Enter Previous and Current digits!", true);
            
            btn.disabled = true;
            btn.innerText = "ANALYZING...";
            sysLog.innerText = "> Fetching data from Database...";

            try {
                // Pre-fetch data early
                const snap = await get(ref(db, `patterns/${n1.value}-${n2.value}`));
                
                // Start Decoding Animation
                row.classList.add("reveal");
                resBox.className = "result-wrapper decoding";
                
                if (scrambleInt) clearInterval(scrambleInt);
                let scrambleChars = "01@#%&*X!";
                scrambleInt = setInterval(() => {
                    resText.innerText = scrambleChars.charAt(Math.floor(Math.random() * scrambleChars.length));
                }, 50);

                // Wait 1.5 Seconds for effect, then lock in Result
                setTimeout(() => {
                    clearInterval(scrambleInt);
                    
                    if(snap.exists() && snap.val()) {
                        let isBig = snap.val().toUpperCase().includes("BIG");
                        
                        // Lock-in Flash Animation
                        resText.innerText = isBig ? "BIG" : "SMALL";
                        resBox.className = "result-wrapper locked " + (isBig ? "res-big" : "res-small");
                        
                        sysLog.innerText = "> Trade Pattern Confirmed! Locked.";
                        btn.innerText = "TRADE ACTIVE";
                        
                        widgetEl.style.borderColor = isBig ? "var(--trade-green)" : "var(--trade-red)";
                        widgetEl.style.boxShadow = isBig ? "0 0 40px rgba(29, 204, 112, 0.4)" : "0 0 40px rgba(255, 45, 85, 0.4)";
                    } else {
                        resText.innerText = "N/A";
                        resBox.className = "result-wrapper locked";
                        resBox.style.background = "#333";
                        sysLog.innerText = "> Err: No pattern data found in DB.";
                        btn.innerText = "ANALYZE";
                        btn.disabled = false;
                    }
                }, 1500); 

            } catch (error) {
                if(scrambleInt) clearInterval(scrambleInt);
                showClientToast("Database Error", true);
                resetResultUI();
            }
        };

        // --- RESET UI FUNCTION (Triggers automatically when period changes) ---
        function resetResultUI() {
            const row = document.getElementById('engine-row');
            const btn = document.getElementById('btn-get');
            const n1 = document.getElementById('currInput');
            const n2 = document.getElementById('prevInput');
            const sysLog = document.getElementById('sys-log');
            const resBox = document.getElementById('result-box');
            
            if (scrambleInt) clearInterval(scrambleInt);
            
            if(row.classList.contains('reveal')) {
                row.classList.remove("reveal");
                resBox.className = "result-wrapper";
                
                widgetEl.style.borderColor = "rgba(255, 255, 255, 0.1)";
                widgetEl.style.boxShadow = "0 30px 60px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.2), 0 0 20px rgba(142, 36, 170, 0.2)";
                
                n1.value = ""; n2.value = "";
                sysLog.innerText = "> AI Engine Standby...";
                btn.innerText = "ANALYZE"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
