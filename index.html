<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>SIKKIM PANNEL BY DEV ARMY</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* =========================================
       🔥 V4.0 CYBERPUNK NEON THEME (SIKKIM PANNEL) 🔥
       ========================================= */
    :root { 
      --tc-neon-red: #ff004c;
      --tc-neon-magenta: #ff0099;
      --tc-neon-cyan: #00f3ff;
      --tc-dark-bg: #070308;
      --tc-card-bg: rgba(10, 2, 8, 0.9);
      --tc-grid-color: rgba(255, 0, 76, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;}
    
    /* 🌌 GLOBAL BACKGROUND */
    body { 
      background-color: var(--tc-dark-bg);
      background-image: radial-gradient(circle at 50% 0%, #2a0011 0%, var(--tc-dark-bg) 60%);
      font-family: 'Inter', sans-serif; 
      overflow: hidden; 
    }

    #mainApp { display: none; width: 100vw; height: 100vh; position: relative; overflow: hidden;}
    .game-loading-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 0; text-align: center; padding: 20px;}
    .bg-game { width: 100%; height: 100%; border: none; background: transparent; position: absolute; top: 0; left: 0; z-index: 1;}

    /* =========================================
       🔥 ULTRA PREMIUM LOGIN / EVENT SCREEN 🔥
       ========================================= */
    #fullOverlayScreen { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto;}
    
    .cyber-login-card {
      width: 100%; max-width: 360px; 
      background: var(--tc-card-bg);
      border: 2px solid var(--tc-neon-red);
      border-radius: 16px;
      padding: 30px 20px;
      position: relative;
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 0, 76, 0.4), inset 0 0 30px rgba(255, 0, 76, 0.15);
    }
    
    /* Internal Grid Pattern */
    .cyber-login-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 14px; z-index: -1;
      background-image: linear-gradient(var(--tc-grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--tc-grid-color) 1px, transparent 1px);
      background-size: 20px 20px; opacity: 0.5;
    }

    .premium-logo { font-size: 55px; color: var(--tc-neon-cyan); margin-bottom: 10px; filter: drop-shadow(0 0 15px var(--tc-neon-cyan)); animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    .hacker-box-input { 
      width: 100%; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,0,76,0.4); border-left: 3px solid var(--tc-neon-red); 
      color: var(--tc-neon-red); padding: 15px; font-family: 'Share Tech Mono'; font-weight: 700; text-align: center; outline: none; 
      font-size: 15px; margin-bottom: 15px; border-radius: 6px; transition: 0.3s; letter-spacing: 2px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); 
    }
    .hacker-box-input::placeholder { color: rgba(255,0,76,0.3); letter-spacing: 1px; }
    .hacker-box-input:focus { border-color: var(--tc-neon-red); box-shadow: inset 0 0 15px rgba(255,0,76,0.2), 0 0 15px rgba(255,0,76,0.4); color: #fff; }
    
    #errorPopup, #evErrorPopup { display: none; color: #fff; font-weight: 800; margin-bottom: 15px; font-size: 11px; text-transform: uppercase; background: rgba(255,0,76,0.2); border: 1px dashed var(--tc-neon-red); padding: 10px; border-radius: 6px; box-shadow: 0 0 15px rgba(255,0,76,0.4); letter-spacing: 1px;}
    
    /* ✂️ ANGLED BUTTONS (CLIP-PATH) ✂️ */
    .btn-angled { 
      width: 100%; background: linear-gradient(135deg, var(--tc-neon-red), #99002e); color: #fff; font-family: 'Outfit'; font-size: 14px; font-weight: 900; padding: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 2px; border: none;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      box-shadow: 0 0 20px rgba(255,0,76,0.4);
    }
    .btn-angled:active { transform: scale(0.96); }

    .btn-outline-angled {
      width: 100%; background: rgba(0, 243, 255, 0.05); border: 1px solid var(--tc-neon-cyan); color: var(--tc-neon-cyan); font-family: 'Outfit'; font-size: 12px; font-weight: 900; padding: 14px; margin-top: 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
    }
    .btn-outline-angled:hover { background: rgba(0, 243, 255, 0.15); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }

    /* 🔥 EVENT DECODER 🔥 */
    #decoderContainer { display: none; margin: 20px 0; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,0,76,0.3);}
    .decoder-title { color: var(--tc-neon-red); font-family: 'Share Tech Mono'; font-size: 11px; margin-bottom: 15px; letter-spacing: 2px; animation: pulseTextRed 0.5s infinite alternate; font-weight: bold;}
    .slots-wrapper { display: flex; justify-content: center; gap: 6px; margin-bottom: 15px; }
    .slot-digit { width: 35px; height: 45px; background: #000; border: 1px solid #333; color: #555; font-family: 'Share Tech Mono'; font-size: 24px; font-weight: bold; display: flex; justify-content: center; align-items: center; border-radius: 6px; box-shadow: inset 0 10px 15px rgba(0,0,0,0.9); transition: 0.3s;}
    .slot-digit.locked { color: var(--tc-neon-cyan); border-color: var(--tc-neon-cyan); box-shadow: 0 0 15px rgba(0,243,255,0.4), inset 0 0 10px rgba(0,243,255,0.1); text-shadow: 0 0 10px var(--tc-neon-cyan); transform: scale(1.1);}
    #decoderStatus { font-family: 'Share Tech Mono'; font-size: 11px; font-weight: bold; letter-spacing: 1px; color: #888;}

    /* EVENT LEADERBOARD */
    .ev-timer-large { font-family: 'Share Tech Mono'; font-size: 34px; color: #ffea00; font-weight: bold; margin: 10px 0; text-shadow: 0 0 20px rgba(255,234,0,0.5); }
    .leaderboard-box { height: 160px; overflow-y: auto; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,0,76,0.3); border-radius: 8px; margin-bottom: 15px; text-align: left; padding: 5px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8);}
    .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px dashed rgba(255,0,76,0.2); font-family: 'Share Tech Mono'; font-size: 11px;}
    .lb-uid { color: #fff; font-weight: bold;}
    .lb-dep { color: #00ff66; font-weight: bold; text-shadow: 0 0 5px rgba(0,255,102,0.5);}
    .lb-pct { color: var(--tc-neon-red); font-weight: bold; font-size: 9px; background: rgba(255,0,76,0.1); padding: 3px 6px; border-radius: 4px; border: 1px solid rgba(255,0,76,0.3);}

    /* =========================================
       🔥 SIKKIM PANNEL WIDGET (JAI CLUB STYLE) 🔥
       ========================================= */
    .draggable-container { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); z-index: 9999; touch-action: none; display: flex; justify-content: center; align-items: center; }
    
    /* Small Collapsed Icon */
    .mod-icon { width: 45px; height: 45px; background: rgba(0,0,0,0.9); border: 2px solid var(--tc-neon-red); border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 20px rgba(255,0,76,0.5); backdrop-filter: blur(5px);}
    .mod-icon i { color: var(--tc-neon-red); font-size: 22px; text-shadow: 0 0 10px var(--tc-neon-red); pointer-events: none; animation: pulseIcon 1.5s infinite alternate;}
    @keyframes pulseIcon { from { transform: scale(1); } to { transform: scale(1.1); } }
    .mod-icon.hidden { display: none; }

    /* The Main Compact Widget Frame (65% Scale) */
    .mod-expanded { 
      display: none; width: 185px; min-height: 120px; 
      background: var(--tc-card-bg); 
      border-radius: 12px; position: relative; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 30px rgba(255,0,76,0.3); 
      padding: 2px; overflow: hidden; backdrop-filter: blur(15px); 
      border: 1px solid var(--tc-neon-red);
    }
    .mod-expanded.active { display: block; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(-20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    
    /* Animated Gradient Border Layer */
    .mod-expanded::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, transparent, var(--tc-neon-red), var(--tc-neon-magenta), transparent); animation: spinBorder 3s linear infinite; z-index: 0; }
    @keyframes spinBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .mod-content-wrapper { position: relative; z-index: 2; width: 100%; height: 100%; background: linear-gradient(to bottom, #0a0205, #000); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; justify-content: flex-start; }
    
    /* Radar Grid Background inside Widget */
    .mod-content-wrapper::after {
      content: ''; position: absolute; inset: 0; border-radius: 10px; z-index: -1; pointer-events: none;
      background-image: linear-gradient(var(--tc-grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--tc-grid-color) 1px, transparent 1px);
      background-size: 15px 15px; opacity: 0.6;
    }

    /* Top Tech Info Bar */
    .tech-header { width: 100%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,0,76,0.3); padding-bottom: 6px; margin-bottom: 8px;}
    .tech-title { font-family: 'Outfit'; font-size: 10px; font-weight: 900; color: #fff; letter-spacing: 1px; display: flex; align-items: center; text-transform: uppercase;}
    .tech-title span { color: var(--tc-neon-red); margin-left: 4px; }
    
    .tech-badges { display: flex; gap: 4px; }
    .badge-mini { font-size: 6px; font-family: 'Share Tech Mono'; padding: 2px 4px; border-radius: 3px; border: 1px solid; background: rgba(0,0,0,0.5); font-weight: bold; letter-spacing: 1px;}
    .bd-live { color: #fff; border-color: var(--tc-neon-red); box-shadow: 0 0 5px rgba(255,0,76,0.5); display: flex; align-items: center; gap: 3px;}
    .bd-live::before { content:''; display:inline-block; width:3px; height:3px; background:var(--tc-neon-red); border-radius:50%; animation: blink 1s infinite;}
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .bd-ping { color: var(--tc-neon-cyan); border-color: var(--tc-neon-cyan); }

    /* Target Setup Row */
    .target-setup { display: flex; justify-content: space-between; background: rgba(0,0,0,0.8); border: 1px dashed rgba(255,255,255,0.1); padding: 5px 6px; border-radius: 5px; margin-bottom: 10px;}
    .target-setup div { font-family: 'Share Tech Mono'; font-size: 8px; color: #aaa; text-transform: uppercase;}
    .target-setup span { color: #fff; font-weight: bold; font-size: 9px;}

    /* MAIN RESULT AREA */
    .result-area { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55px; margin-bottom: 10px; width: 100%; border: 1px solid rgba(255,0,76,0.1); background: rgba(255,0,76,0.02); border-radius: 6px;}
    
    /* Layout: [Num1] [BIG/SMALL] [Num2] (Scaled Down) */
    .hack-result-row { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 4px; }
    .num-block { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    
    .num-val { font-size: 16px; font-weight: 900; font-family: 'Share Tech Mono'; color: #fff; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 3px 6px rgba(0,0,0,0.5); }
    .num-prob { font-size: 7px; color: var(--tc-neon-cyan); font-weight: bold; background: rgba(0, 243, 255, 0.1); padding: 2px 4px; border-radius: 3px; border: 1px solid rgba(0, 243, 255, 0.3); font-family: 'Share Tech Mono'; letter-spacing: 1px;}
    
    .size-block { flex: 1; display: flex; justify-content: center; align-items: center; padding: 0 4px; }
    .size-val { font-family: 'Outfit'; font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; border-radius: 5px; color: #fff; line-height: 1; text-align: center;}

    .bg-red { background: radial-gradient(circle at 30% 30%, #ff1744, #990026); border-color: var(--tc-neon-red); text-shadow: 0 0 5px #fff; box-shadow: 0 0 8px rgba(255,0,76,0.4); }
    .bg-green { background: radial-gradient(circle at 30% 30%, #00e676, #008040); border-color: #00e676; text-shadow: 0 0 5px #fff; box-shadow: 0 0 8px rgba(0,230,118,0.4); }
    .bg-violet { background: linear-gradient(135deg, #d500f9 50%, var(--tc-neon-red) 50%); border-color: #d500f9; text-shadow: 0 0 5px #fff; box-shadow: 0 0 8px rgba(213,0,249,0.4); }

    .size-big { background: linear-gradient(135deg, rgba(255,234,0,0.2), #000); border: 1px solid #ffea00; text-shadow: 0 0 6px #ffea00; box-shadow: inset 0 0 8px rgba(255,234,0,0.2), 0 0 10px rgba(255,234,0,0.3); animation: breathGold 1.5s infinite alternate; }
    .size-small { background: linear-gradient(135deg, rgba(0,243,255,0.2), #000); border: 1px solid var(--tc-neon-cyan); text-shadow: 0 0 6px var(--tc-neon-cyan); box-shadow: inset 0 0 8px rgba(0,243,255,0.2), 0 0 10px rgba(0,243,255,0.3); animation: breathCyan 1.5s infinite alternate; }

    .res-ready { color: #fff; font-size: 13px; font-family: 'Outfit'; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 8px rgba(255,255,255,0.3);}
    .res-locked { color: var(--tc-neon-red); font-size: 13px; font-family: 'Outfit'; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px var(--tc-neon-red); animation: pulseTextRed 1s infinite alternate;}

    /* LASER SCAN ANIMATION OVERLAY */
    .laser-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 76, 0.05); border-radius: 6px; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255, 0, 76, 0.3); box-shadow: inset 0 0 10px rgba(255,0,76,0.2);}
    .laser-line { position: absolute; left: 0; width: 100%; height: 2px; background: var(--tc-neon-red); box-shadow: 0 0 10px var(--tc-neon-red), 0 0 15px #fff; animation: laserSweep 0.6s linear infinite alternate; z-index: 10; }
    @keyframes laserSweep { 0% { top: 0%; opacity: 0.5; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0.5; } }
    .scanning-text { color: var(--tc-neon-red); font-size: 10px; font-family: 'Share Tech Mono'; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 8px var(--tc-neon-red); animation: pulseTextRed 0.5s infinite alternate; z-index: 11;}

    @keyframes breathGold { from { filter: drop-shadow(0 0 2px rgba(255,234,0,0.2)); transform: scale(1);} to { filter: drop-shadow(0 0 6px rgba(255,234,0,0.6)); transform: scale(1.05);} }
    @keyframes breathCyan { from { filter: drop-shadow(0 0 2px rgba(0,243,255,0.2)); transform: scale(1);} to { filter: drop-shadow(0 0 6px rgba(0,243,255,0.6)); transform: scale(1.05);} }
    @keyframes pulseTextRed { from { opacity: 0.5; } to { opacity: 1; filter: drop-shadow(0 0 5px var(--tc-neon-red));} }

    /* ACTION BUTTONS (ANGLED) */
    .action-row { display: flex; justify-content: center; gap: 6px; width: 100%; margin-top: auto;}
    
    .btn-panel { 
      flex: 1; font-family: 'Outfit'; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: all 0.15s ease; letter-spacing: 1px; min-height: 32px; display: flex; justify-content: center; align-items: center; gap: 4px; border: none;
      clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    }
    
    .btn-scan { background: linear-gradient(135deg, var(--tc-neon-red), #b30036); color: #fff; box-shadow: inset 0 0 8px rgba(255,255,255,0.2); }
    .btn-scan:active { transform: scale(0.95); }
    .btn-scan:disabled { background: #1a0008; color: #440011; cursor: not-allowed; transform: scale(1);}
    
    .btn-hide { background: #111; color: var(--tc-neon-cyan); border-left: 2px solid var(--tc-neon-cyan); box-shadow: inset 0 0 8px rgba(0,243,255,0.1); }
    .btn-hide:active { transform: scale(0.95); }

    /* SYSTEM MAINTENANCE UI */
    #uiMaint { width: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; flex: 1;}
    .maint-icon { font-size: 22px; color: var(--tc-neon-red); margin-bottom: 6px; filter: drop-shadow(0 0 8px rgba(255,0,76,0.6)); animation: pulseRed 2s infinite ease-in-out;}
    .maint-title-in { font-family: 'Outfit'; font-size: 12px; color: var(--tc-neon-red); font-weight: 900; letter-spacing: 1px; margin-bottom: 4px;}
    .maint-time-val { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--tc-neon-cyan); font-weight: bold; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 5px; border: 1px solid #1a2333;}

    /* ALERTS & GLOWS */
    .anim-win { animation: winPulse 1.5s infinite alternate; border-color: #00e676 !important; }
    @keyframes winPulse { 0% { box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); } 100% { box-shadow: 0 0 25px rgba(0, 230, 118, 0.9); } }
    .anim-loss { animation: lossShakeAnim 0.5s ease-out; border-color: var(--tc-neon-red) !important; box-shadow: 0 0 20px rgba(255, 0, 76, 0.8) !important; }
    @keyframes lossShakeAnim { 0% { transform: translateX(0); } 25% { transform: translateX(-3px); } 50% { transform: translateX(3px); } 75% { transform: translateX(-3px); } 100% { transform: translateX(0); } }

    .jackpot-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--tc-neon-red), #99002e); color: #fff; font-weight: 900; padding: 10px 20px; border-radius: 4px; font-size: 11px; z-index: 30000; box-shadow: 0 8px 25px rgba(255,0,76,0.7); font-family: 'Share Tech Mono'; letter-spacing: 1px; animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border: 1px solid #fff; white-space: nowrap; clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);}
    @keyframes slideUp { from { opacity: 0; bottom: 0; transform: translate(-50%, 20px); } to { opacity: 1; bottom: 30px; transform: translate(-50%, 0); } }

  </style>
</head>
<body>

  <!-- MAIN APP PLATFORM INTERFACE -->
  <div id="mainApp">

      <p style="color: var(--tc-neon-red); font-family: 'Share Tech Mono'; font-weight: bold; margin-top: 20px; letter-spacing: 3px; font-size: 14px; text-shadow:0 0 10px var(--tc-neon-red);">ESTABLISHING CONNECTION...</p>
    </div>

    <!-- 🔥 BG IFRAME SECURED 🔥 -->

    <div class="draggable-container" id="draggableWidget">

      <!-- MAIN COMPACT HACK PANEL -->

          <div class="result-area" id="resBox">

          <div class="action-row">

            <button class="btn-panel btn-hide" id="hideBtn">HIDE</button>
          </div>
          
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, get, child, update, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyBNj71akpefcfEtn-SQfAcx-Pgwi8sUosg", authDomain: "teamdev-88676.firebaseapp.com", databaseURL: "https://teamdev-88676-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "teamdev-88676" };
    const app = initializeApp(firebaseConfig); const database = getDatabase(app);

    window.API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json"; 

    const fullOverlay = document.getElementById('fullOverlayScreen'); const mainApp = document.getElementById('mainApp'); const errBox = document.getElementById('errorPopup');
    const analyzeBtn = document.getElementById('analyzeBtn'); const resBox = document.getElementById('resBox');

    window.showEventLogin = () => { document.getElementById('loginFormCard').style.display='none'; document.getElementById('eventLoginFormCard').style.display='block'; }
    window.hideEventLogin = () => { document.getElementById('eventLoginFormCard').style.display='none'; document.getElementById('loginFormCard').style.display='block'; }

    // 🔥 DYNAMIC FIREBASE SYNC (URLS & MAINTENANCE) 🔥
    let sleepCheckInterval = null; let systemIsLocked = false; window.isHeld = false;
    onValue(ref(database, 'systemConfig'), (snapshot) => {
      if(snapshot.exists()) {
        const config = snapshot.val();
        if(config.links) {
            if(config.links.gameUrl) document.getElementById('gameIframe').src = config.links.gameUrl;
            if(config.links.supportUrl && document.getElementById('supportBtn')) document.getElementById('supportBtn').href = config.links.supportUrl;
        }
        if(config.maintenance && config.maintenance.mode !== 'OPEN') {
           systemIsLocked = true; analyzeBtn.disabled = true; analyzeBtn.innerHTML = "OFFLINE";
           resBox.innerHTML = `<div class="res-locked" style="color:#ff9900; text-shadow:0 0 10px #ff9900;">MAINTENANCE</div>`;
        } else {
           systemIsLocked = false;
           if(!window.isHeld) { 
               analyzeBtn.disabled = false; analyzeBtn.innerHTML = "<i class='fa-solid fa-radar'></i> PREDICT"; 
               resBox.innerHTML = `<div class="res-ready">READY</div>`;
           }
        }
      }
    });

    let currentPolarity = 'NORMAL'; onValue(ref(database, 'server/polarity'), (snap) => { currentPolarity = snap.val() || 'NORMAL'; });
    let currentGodMode = { size: "AUTO" }; onValue(ref(database, 'server/override'), (snap) => { if(snap.exists()) currentGodMode = snap.val(); else currentGodMode = { size: "AUTO" }; });

    // AUTH MAIN ENTRY
    document.getElementById('activateBtn').addEventListener('click', async () => {
      const key = document.getElementById('loginKey').value.trim().toUpperCase(); 
      if(!key) { errBox.style.display='block'; errBox.innerText="ENTER ACCESS KEY"; return; }
      document.getElementById('activateBtn').innerText = "AUTHENTICATING...";
      try {
        const snap = await get(child(ref(database), `keys/${key}`));
        if(snap.exists() && snap.val().status === "ACTIVE") {
          fullOverlay.style.display = 'none'; mainApp.style.display = 'block'; initEngine(); toggleWidget();
        } else { errBox.style.display='block'; errBox.innerText="INVALID OR INACTIVE KEY"; document.getElementById('activateBtn').innerText="LOGIN SECURE NODE"; }
      } catch(e) { errBox.style.display='block'; errBox.innerText="NETWORK ERROR"; document.getElementById('activateBtn').innerText="LOGIN SECURE NODE"; }
    });

    // EVENT VALIDATION LOGIC
    document.getElementById('joinEvBtn').addEventListener('click', async () => {
      const uidStr = document.getElementById('evInputUid').value.trim();
      const evErr = document.getElementById('evErrorPopup');
      const joinBtn = document.getElementById('joinEvBtn');

      if(uidStr.length !== 7 || uidStr.charAt(0) !== '6') { evErr.style.display='block'; evErr.innerText="YOUR ID IS NOT VALID FOR PARTICIPATION."; return; }
      evErr.style.display = 'none'; joinBtn.innerText = "CHECKING DATABASE...";
      
      try {
          const pSnap = await get(child(ref(database), `events/participants/${uidStr}`));
          if(!pSnap.exists()) { evErr.style.display='block'; evErr.innerText="ACCESS DENIED: UID NOT REGISTERED BY ADMIN."; joinBtn.innerText = "VERIFY IDENTITY"; return; }

          document.getElementById('evJoinInputs').style.display = 'none';
          document.getElementById('backToLoginBtn').style.display = 'none';
          
          const decoder = document.getElementById('decoderContainer');
          const slotsWrap = document.getElementById('slotsWrapper');
          decoder.style.display = 'block';
          
          let slotsHtml = ''; for(let i=0; i<7; i++) { slotsHtml += `<div class="slot-digit" id="slot_${i}">0</div>`; }
          slotsWrap.innerHTML = slotsHtml;

          const statusEl = document.getElementById('decoderStatus');
          statusEl.innerText = "MATCHING UID IN GLOBAL DATABASE..."; statusEl.style.color = "#888";
          
          let intervals = []; const finalDigits = uidStr.split('');
          for(let i=0; i<7; i++) { intervals[i] = setInterval(() => { document.getElementById(`slot_${i}`).innerText = Math.floor(Math.random() * 10); }, 50); }

          for(let i=0; i<7; i++) {
             setTimeout(() => {
                 clearInterval(intervals[i]);
                 const slotEl = document.getElementById(`slot_${i}`);
                 slotEl.innerText = finalDigits[i]; slotEl.classList.add('locked');
             }, 1000 + (i * 450)); 
          }

          setTimeout(() => {
              statusEl.innerText = `UID ${uidStr} VERIFIED SUCCESSFULLY!`;
              statusEl.style.color = "var(--tc-neon-cyan)";
              setTimeout(showRealLeaderboard, 1500);
          }, 1000 + (7 * 450)); 

      } catch(e) { evErr.style.display='block'; evErr.innerText="SERVER ERROR DURING VERIFICATION."; joinBtn.innerText = "VERIFY IDENTITY"; }

      async function showRealLeaderboard() {
         document.getElementById('decoderContainer').style.display = 'none';
         document.getElementById('nextEventArea').style.display = 'block';
         document.getElementById('backToLoginBtn').style.display = 'block';
         
         const allPartsSnap = await get(child(ref(database), `events/participants`));
         if(allPartsSnap.exists()) {
             let parts = Object.values(allPartsSnap.val()); parts.sort((a,b) => b.deposit - a.deposit);
             let tableHtml = ''; let totalDep = parts.reduce((sum, p) => sum + (p.deposit||0), 0);
             parts.forEach(member => {
                 let displayUid = member.uid === uidStr ? member.uid : `6${member.uid.substring(1,3)}****`;
                 let winChance = totalDep > 0 ? ((member.deposit / totalDep) * 100).toFixed(1) + "%" : "0%";
                 tableHtml += `<div class="lb-row"><span class="lb-uid">👤 ID: ${displayUid}</span><span class="lb-dep">₹${member.deposit}</span><span class="lb-pct">WIN: ${winChance}</span></div>`;
             });
             document.getElementById('leaderboardBox').innerHTML = tableHtml;
         }
      }
    });

    // DRAG LOGIC
    const container = document.getElementById("draggableWidget"); const iconCollapsed = document.getElementById("modIcon"); const expandedBox = document.getElementById("modExpanded");
    let isDragging = false, hasMoved = false, startX, startY, initialX, initialY;
    function enforceScreenBounds() { const rect = container.getBoundingClientRect(); let newLeft = Math.max(0, Math.min(rect.left, window.innerWidth - rect.width)); let newTop = Math.max(20, Math.min(rect.top, window.innerHeight - rect.height - 20)); container.style.transform = 'none'; container.style.left = newLeft + 'px'; container.style.top = newTop + 'px'; }
    function toggleWidget() { if(expandedBox.classList.contains('active')) { expandedBox.classList.remove('active'); iconCollapsed.classList.remove('hidden'); } else { iconCollapsed.classList.add('hidden'); expandedBox.classList.add('active'); } setTimeout(enforceScreenBounds, 20); }
    iconCollapsed.addEventListener('click', () => { if(!hasMoved) toggleWidget(); }); document.getElementById('hideBtn').addEventListener('click', toggleWidget); window.addEventListener('resize', enforceScreenBounds);
    function dragStart(e) { if(e.target.closest('.action-row')) return; initialX = (e.type === "touchstart") ? e.touches[0].clientX : e.clientX; initialY = (e.type === "touchstart") ? e.touches[0].clientY : e.clientY; const rect = container.getBoundingClientRect(); startX = initialX - rect.left; startY = initialY - rect.top; isDragging = true; hasMoved = false; }
    function drag(e) { if (!isDragging) return; const currentX = (e.type === "touchmove") ? e.touches[0].clientX : e.clientX; const currentY = (e.type === "touchmove") ? e.touches[0].clientY : e.clientY; if (Math.abs(currentX - initialX) > 4 || Math.abs(currentY - initialY) > 4) { hasMoved = true; e.preventDefault(); let newLeft = currentX - startX; let newTop = currentY - startY; newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - container.offsetWidth)); newTop = Math.max(20, Math.min(newTop, window.innerHeight - container.offsetHeight - 20)); container.style.transform = 'none'; container.style.left = newLeft + 'px'; container.style.top = newTop + 'px'; } }
    function dragEnd() { isDragging = false; enforceScreenBounds(); }
    container.addEventListener("touchstart", dragStart, { passive: false }); document.addEventListener("touchmove", drag, { passive: false }); document.addEventListener("touchend", dragEnd); container.addEventListener("mousedown", dragStart); document.addEventListener("mousemove", drag); document.addEventListener("mouseup", dragEnd);

    // APP TIMERS
    setInterval(() => { const now = new Date(); let secLeft = 60 - now.getSeconds(); if(secLeft === 60) secLeft = 0; const timerEl = document.getElementById('countdownTimer'); if(timerEl) timerEl.innerText = `00:${secLeft < 10 ? '0'+secLeft : secLeft}`; }, 1000);

    // =========================================
    // 🔥 WANTEDSCARY AI FORMULA 🔥
    // =========================================
    function getSizeFromNumber(num) { if (num === undefined || num === null) return null; return num >= 5 ? "BIG" : "SMALL"; }
    function getBallClass(num) {
        if(num === 0) return 'bg-violet'; if(num === 5) return 'bg-violet';
        if([2,4,6,8].includes(num)) return 'bg-red'; return 'bg-green';
    }

    function generateAIPrediction(historyArray) {
      let predictedSize = "BIG"; let sure1 = 5, sure2 = 8;
      const validDraws = (historyArray || []).filter(d => d !== undefined && d.number !== undefined && !isNaN(d.number)).slice(0, 20);
      if (validDraws.length === 0) return { predictionSize: "BIG", sureNumbers: [6, 9] };
      const recent = [...validDraws].slice(0, 12); const recentSizes = recent.map(r => getSizeFromNumber(r.number)).filter(s => s !== null); const recentNumbers = recent.map(r => r.number);
      if (recentSizes.length >= 3) {
        let streakLength = 1; for (let i = 1; i < recentSizes.length; i++) { if (recentSizes[i] === recentSizes[0]) streakLength++; else break; }
        if (streakLength >= 3) { predictedSize = recentSizes[0] === "BIG" ? "SMALL" : "BIG"; } 
        else {
          const last7 = recentSizes.slice(0, 7); const bigCount = last7.filter(s => s === "BIG").length; const smallCount = last7.filter(s => s === "SMALL").length;
          if (bigCount > smallCount + 1) predictedSize = "SMALL"; else if (smallCount > bigCount + 1) predictedSize = "BIG"; else { predictedSize = recentSizes[0] === "BIG" ? "SMALL" : "BIG"; }
        }
      } else { predictedSize = Math.random() > 0.5 ? "BIG" : "SMALL"; }
      
      const freqMap = new Map(); recentNumbers.forEach(n => freqMap.set(n, (freqMap.get(n) || 0) + 1)); let hotNumbers = [...freqMap.entries()].sort((a,b) => b[1] - a[1]).map(e => e[0]);
      const bigPool = [5,6,7,8,9]; const smallPool = [0,1,2,3,4]; const targetPool = predictedSize === "BIG" ? bigPool : smallPool;
      let hotInPool = hotNumbers.filter(n => targetPool.includes(n)); let coldInPool = targetPool.filter(n => ![...new Set(recentNumbers.filter(n => targetPool.includes(n)))].includes(n));
      let candidates = []; if (hotInPool.length >= 2) { candidates = hotInPool.slice(0, 4); } else if (hotInPool.length === 1) { candidates = [hotInPool[0], ...coldInPool.slice(0,2)]; } else { candidates = coldInPool.length >= 2 ? coldInPool.slice(0,4) : targetPool.slice(0,4); }
      if (candidates.length < 2) candidates = [...targetPool]; let uniqueCandidates = [...new Set(candidates)]; if (uniqueCandidates.length === 1) uniqueCandidates = targetPool.filter(v => v !== uniqueCandidates[0]).concat(uniqueCandidates);
      sure1 = uniqueCandidates[0]; sure2 = uniqueCandidates.length > 1 ? uniqueCandidates[1] : (uniqueCandidates[0] === targetPool[0] ? targetPool[1] : targetPool[0]);
      if (sure1 === sure2) sure2 = (sure1 + 3) % 10; if (!targetPool.includes(sure1)) sure1 = targetPool[0]; if (!targetPool.includes(sure2)) sure2 = targetPool[targetPool.length-1];
      sure1 = Math.min(9, Math.max(0, sure1)); sure2 = Math.min(9, Math.max(0, sure2)); if (sure1 === sure2) sure2 = (sure1 + 7) % 10; if (!targetPool.includes(sure2)) sure2 = sure1 === targetPool[0] ? targetPool[1] : targetPool[0];
      return { predictionSize: predictedSize, sureNumbers: [sure1, sure2] };
    }

    function showJackpotToast(msg) {
      const toast = document.createElement('div'); toast.className = 'jackpot-toast'; toast.innerText = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 4000); 
    }

    let fetchingLock = false; let internalLatestPeriod = null; let activePrediction = null; let predictedPeriodId = null; 

    async function fetchAndProcess() {
      if(fetchingLock) return; fetchingLock = true;
      try {
        const res = await fetch(`${window.API_URL}?ts=${Date.now()}`, { headers: {'Accept':'application/json'} }); const json = await res.json();
        const draws = json.data.list.map(i => ({ issueNumber: String(i.issueNumber), number: parseInt(i.number), size: parseInt(i.number) >= 5 ? "BIG" : "SMALL" })).filter(d => !isNaN(d.number));
        const latest = draws[0]; const nextPeriodId = (BigInt(latest.issueNumber) + 1n).toString();
        
        let justEvaluated = false;
        if(predictedPeriodId === latest.issueNumber) {
            const isSizeWin = (latest.size === activePrediction.predictionSize); const isJackpot = activePrediction.sureNumbers.includes(latest.number);
            expandedBox.classList.remove('anim-win', 'anim-loss'); void expandedBox.offsetWidth; 
            if(isSizeWin) expandedBox.classList.add('anim-win'); else expandedBox.classList.add('anim-loss');
            if(isJackpot) showJackpotToast(`🔥 JACKPOT HIT! Number ${latest.number} drawn! 🔥`);
            predictedPeriodId = null; justEvaluated = true;
        }

        if(internalLatestPeriod !== nextPeriodId) {
          internalLatestPeriod = nextPeriodId; document.getElementById('periodBadge').textContent = nextPeriodId.slice(-4); 
          
          if(currentGodMode.size !== "AUTO") {
             let forcedSize = currentGodMode.size;
             if(forcedSize === "SKIP") activePrediction = { predictionSize: "SKIP", sureNumbers: [0,0] };
             else activePrediction = { predictionSize: forcedSize, sureNumbers: forcedSize === "BIG" ? [7,9] : [1,3] };
          } else {
             activePrediction = generateAIPrediction(draws);
             if(currentPolarity === 'REVERSE' && activePrediction.predictionSize !== "SKIP") {
                activePrediction.predictionSize = activePrediction.predictionSize === "BIG" ? "SMALL" : "BIG"; activePrediction.sureNumbers = activePrediction.predictionSize === "BIG" ? [6,8] : [2,4];
             }
          }
          
          if(!systemIsLocked && !window.isHeld) {
              analyzeBtn.disabled = false; analyzeBtn.innerHTML = "<i class='fa-solid fa-radar'></i> PREDICT"; 
              if(!justEvaluated && !predictedPeriodId) { resBox.innerHTML = `<div class="res-ready">READY</div>`; expandedBox.classList.remove('anim-win', 'anim-loss'); }
          }
        }
      } catch(e) { } finally { fetchingLock = false; }
    }

    // 🔥 V4 CYBERPUNK LAYOUT WITH PROBABILITY & LASER 🔥
    analyzeBtn.addEventListener('click', () => {
      if(!activePrediction || predictedPeriodId === internalLatestPeriod || systemIsLocked || window.isHeld) return; 
      analyzeBtn.disabled = true; predictedPeriodId = internalLatestPeriod; expandedBox.classList.remove('anim-win', 'anim-loss');
      
      resBox.innerHTML = `<div class="laser-overlay"><div class="laser-line"></div><div class="scanning-text">DECRYPTING...</div></div>`;
      
      setTimeout(() => {
          if(activePrediction.predictionSize === "SKIP") {
              resBox.innerHTML = `<div class="res-ready" style="color:#666;">SKIP</div>`;
          } else {
              let prob1 = Math.floor(Math.random() * 25) + 75; // 75% to 99%
              let prob2 = Math.floor(Math.random() * 25) + 70; // 70% to 94%
              let sizeClass = activePrediction.predictionSize === 'SMALL' ? 'size-small' : 'size-big';
              
              resBox.innerHTML = `
                 <div class="hack-result-row">
                    <div class="num-block">
                       <div class="num-val ${getBallClass(activePrediction.sureNumbers[0])}">${activePrediction.sureNumbers[0]}</div>
                       <div class="num-prob">${prob1}%</div>
                    </div>
                    <div class="size-block">
                       <div class="size-val ${sizeClass}">${activePrediction.predictionSize}</div>
                    </div>
                    <div class="num-block">
                       <div class="num-val ${getBallClass(activePrediction.sureNumbers[1])}">${activePrediction.sureNumbers[1]}</div>
                       <div class="num-prob">${prob2}%</div>
                    </div>
                 </div>
              `;
          }
          analyzeBtn.innerHTML = "<i class='fa-solid fa-check'></i> COMPLETED";
      }, 1000); 
    });

    function initEngine() { fetchAndProcess(); setInterval(fetchAndProcess, 5000); }
  </script>
